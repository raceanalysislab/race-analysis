<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1020" />
  <title>レース詳細</title>

  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/grid.css" />

  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --raceTopH: 138px;

      --bg:#07101f;
      --bg2:#0d1a33;
      --panel:#101b33;
      --panel2:#162442;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);

      --text:#eef4ff;
      --muted:#95a5c2;
      --accent:#ffb100;

      --card:#ffffff;
      --cardText:#0f172a;
      --cardMuted:#64748b;
      --shadow:0 14px 34px rgba(0,0,0,.28);

      --good:#16a34a;
      --mid:#d97706;
      --low:#64748b;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(900px 520px at 50% -12%, rgba(84,140,255,.18), transparent 42%),
        linear-gradient(180deg, var(--bg) 0%, #050d1b 100%);
      color:var(--text);
      overscroll-behavior-y:none;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
    }

    body{
      padding-top:var(--safe-top);
    }

    .raceTop{
      position:sticky;
      top:0;
      z-index:50;
      padding:10px 14px 8px;
      background:
        linear-gradient(180deg, rgba(7,16,31,.98) 0%, rgba(7,16,31,.94) 74%, rgba(7,16,31,0) 100%);
      backdrop-filter: blur(10px) saturate(120%);
    }

    .raceHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:14px;
      border-radius:20px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        linear-gradient(180deg, var(--panel2) 0%, var(--panel) 100%);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .raceHead__left{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .raceVenue{
      font-size:24px;
      line-height:1.02;
      font-weight:1000;
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .raceMeta{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
      line-height:1;
    }

    .metaChip{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line-soft);
      white-space:nowrap;
    }

    .raceBtn{
      appearance:none;
      border:none;
      min-width:74px;
      height:44px;
      padding:0 14px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      color:#fff;
      font-size:14px;
      font-weight:900;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
      flex:0 0 auto;
    }

    .raceTabs{
      margin-top:12px;
      display:flex;
      gap:8px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      padding-bottom:3px;
      scroll-behavior:smooth;
    }

    .raceTabs::-webkit-scrollbar{ display:none; }

    .tab{
      flex:0 0 auto;
      appearance:none;
      min-width:58px;
      height:40px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      color:#dce8fb;
      font-size:14px;
      font-weight:900;
      line-height:1;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .tab.is-active{
      background:linear-gradient(180deg, #ffd34f 0%, #ffb000 100%);
      color:#08111e;
      border-color:transparent;
      box-shadow:
        0 8px 20px rgba(255,176,0,.20),
        inset 0 1px 0 rgba(255,255,255,.42);
    }

    .raceBody{
      height:calc(100dvh - var(--raceTopH));
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:8px 14px calc(16px + var(--safe-bottom));
    }

    .section{
      padding:12px;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .sectionHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      padding-bottom:10px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .sectionTitle{
      font-size:14px;
      font-weight:1000;
      letter-spacing:.03em;
      color:#dce9ff;
    }

    .sectionMeta{
      font-size:11px;
      line-height:1.45;
      color:var(--muted);
      text-align:right;
      white-space:nowrap;
    }

    .table{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .row{
      display:grid;
      grid-template-columns: 52px 1fr 128px;
      gap:10px;
      align-items:center;
      min-height:80px;
      padding:10px;
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.985), rgba(242,247,252,.96));
      color:var(--cardText);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 6px 16px rgba(0,0,0,.10);
    }

    .waku{
      width:52px;
      height:52px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:1000;
      letter-spacing:-.03em;
      border:1px solid rgba(15,23,42,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.30);
    }
    .waku.w1{ background:#ffffff; color:#111827; }
    .waku.w2{ background:#1f2937; color:#ffffff; }
    .waku.w3{ background:#f35a5a; color:#ffffff; }
    .waku.w4{ background:#4e89ff; color:#ffffff; }
    .waku.w5{ background:#f7d94c; color:#111827; }
    .waku.w6{ background:#44c66f; color:#111827; }

    .info{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
    }

    .name{
      font-size:17px;
      line-height:1.14;
      font-weight:1000;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:.01em;
    }

    .sub{
      display:flex;
      gap:8px 10px;
      flex-wrap:wrap;
      font-size:12px;
      line-height:1.2;
      color:var(--cardMuted);
    }

    .metric{
      min-width:0;
      align-self:stretch;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-end;
      gap:5px;
      text-align:right;
    }

    .st{
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:13px;
      line-height:1.2;
      font-weight:900;
      color:#0f172a;
    }

    .win{
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:11px;
      line-height:1.25;
      color:#64748b;
    }

    .rate-high{ color:var(--good); }
    .rate-mid{ color:var(--mid); }
    .rate-low{ color:var(--low); }

    .muted{ color:#64748b; }

    .note{
      margin-top:10px;
      padding:10px 12px 2px;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.6;
    }

    .err{
      padding:12px 14px;
      border-radius:16px;
      border:1px dashed rgba(255,255,255,.16);
      background:rgba(255,255,255,.04);
      color:#dbeafe;
      font-size:12px;
      line-height:1.7;
      word-break:break-word;
    }

    @media (max-width: 390px){
      :root{ --raceTopH: 134px; }
      .raceTop{ padding:8px 12px 7px; }
      .raceHead{ padding:12px; }
      .raceVenue{ font-size:22px; }
      .row{
        grid-template-columns: 48px 1fr 112px;
        min-height:74px;
        padding:9px;
      }
      .waku{
        width:48px;
        height:48px;
        font-size:26px;
      }
      .name{ font-size:16px; }
      .sub{ font-size:11px; }
      .st{ font-size:12px; }
      .win{ font-size:10px; }
    }

    @media (max-height: 740px){
      .raceTop{ padding:8px 14px 6px; }
      .raceHead{ padding:12px; }
      .raceTabs{ margin-top:10px; }
      .raceBody{ padding-top:6px; }
      .row{
        min-height:74px;
        padding:9px;
      }
      .name{ font-size:16px; }
    }
  </style>
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>
        <div class="raceMeta">
          <span class="metaChip" id="raceNoLabel">—R</span>
          <span class="metaChip" id="timeLabel">締切: --:--</span>
          <span class="metaChip" id="dayLabel">—</span>
        </div>
      </div>
      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody" id="raceBody">
    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle">出走表</div>
        <div class="sectionMeta">開催場タップ後に<br>6選手を確認</div>
      </div>

      <div class="table" id="table"></div>

      <div class="note" id="note">
        ※無料版は「各選手データの確認」専用です。予想は表示しません。
      </div>
    </section>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const venueNameRaw = qs.get("name") || "会場";
    const venueName = decodeURIComponent(venueNameRaw);
    const jcd = String(qs.get("jcd") || "").padStart(2, "0");

    document.getElementById("venueName").textContent = venueName;

    const $tabs = document.getElementById("tabs");
    const $table = document.getElementById("table");
    const $raceNoLabel = document.getElementById("raceNoLabel");
    const $timeLabel = document.getElementById("timeLabel");
    const $dayLabel = document.getElementById("dayLabel");
    const $raceTop = document.getElementById("raceTop");

    const BOT_RACES_BASE_URL =
      "https://cdn.jsdelivr.net/gh/raceanalysislab/race-data-bot@main/data/site/races/";

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    function toHM(x){
      const s = String(x || "");
      const m = s.match(/(\d{1,2}):(\d{2})/);
      if (!m) return "--:--";
      const hh = String(m[1]).padStart(2, "0");
      return `${hh}:${m[2]}`;
    }

    function setTopHeight(){
      const h = $raceTop.getBoundingClientRect().height || 138;
      document.documentElement.style.setProperty("--raceTopH", `${Math.ceil(h)}px`);
    }

    addEventListener("resize", () => setTopHeight(), { passive:true });
    requestAnimationFrame(() => setTopHeight());

    function centerActiveTab(){
      const active = $tabs.querySelector(".tab.is-active");
      if (!active) return;

      const offset = active.offsetLeft - ($tabs.clientWidth / 2) + (active.clientWidth / 2);
      $tabs.scrollTo({
        left: Math.max(0, offset),
        behavior: "smooth"
      });
    }

    function makeTabs(active){
      $tabs.innerHTML = "";
      for(let r = 1; r <= 12; r++){
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tab" + (r === active ? " is-active" : "");
        b.textContent = r + "R";
        b.addEventListener("click", () => setRace(r));
        $tabs.appendChild(b);
      }
      requestAnimationFrame(centerActiveTab);
    }

    function escapeHTML(s){
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[c]));
    }

    async function fetchJSON(url){
      const bust = url.includes("?") ? `&t=${Date.now()}` : `?t=${Date.now()}`;
      const res = await fetch(url + bust, { cache:"no-store" });
      if (!res.ok) throw new Error(`failed: ${url}`);
      return await res.json();
    }

    function normalizeBoatsTo6(boats){
      const byWaku = new Map();

      for (const b of boats){
        const w = Number(b?.waku);
        if (w >= 1 && w <= 6 && !byWaku.has(w)){
          byWaku.set(w, b);
        }
      }

      const rest = boats.filter((b) => {
        const w = Number(b?.waku);
        return !(w >= 1 && w <= 6 && byWaku.get(w) === b);
      });

      for (let w = 1; w <= 6; w++){
        if (!byWaku.has(w) && rest.length){
          const b = rest.shift();
          byWaku.set(w, { ...b, waku: w });
        }
      }

      const out = [];
      for (let w = 1; w <= 6; w++){
        out.push(
          byWaku.get(w) || {
            waku:w,
            name:"—",
            regno:"",
            branch:"",
            age:"",
            grade:"",
            nat_win:null,
            nat_2:null,
            motor_no:"",
            motor_2:"",
            boat_no:"",
            boat_2:""
          }
        );
      }
      return out;
    }

    function rateClass(value){
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (n >= 6.0) return "rate-high";
      if (n >= 5.0) return "rate-mid";
      return "rate-low";
    }

    function percentClass(value){
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (n >= 45) return "rate-high";
      if (n >= 30) return "rate-mid";
      return "rate-low";
    }

    function rowHTML(p){
      const w = Number(p.waku ?? 0) || 0;

      const idText = (p.regno || p.id) ? `登録 ${p.regno || p.id}` : "";
      const branchText = p.branch ? String(p.branch) : "";
      const ageText = (p.age !== undefined && p.age !== null && p.age !== "") ? `年齢 ${p.age}` : "";
      const gradeText = p.grade ? String(p.grade) : "";

      const natWinVal = (p.nat_win !== undefined && p.nat_win !== null && p.nat_win !== "")
        ? Number(p.nat_win).toFixed(2)
        : "";
      const nat2Val = (p.nat_2 !== undefined && p.nat_2 !== null && p.nat_2 !== "")
        ? Number(p.nat_2).toFixed(2)
        : "";

      const motor = (p.motor_no !== undefined && p.motor_no !== null && p.motor_no !== "")
        ? `M${p.motor_no} (${p.motor_2 ?? ""}%)`
        : "";
      const boat = (p.boat_no !== undefined && p.boat_no !== null && p.boat_no !== "")
        ? `B${p.boat_no} (${p.boat_2 ?? ""}%)`
        : "";

      const winHTML = natWinVal
        ? `<span class="${rateClass(natWinVal)}">勝率 ${escapeHTML(natWinVal)}</span>`
        : "";

      const nat2HTML = nat2Val
        ? `<span class="${percentClass(nat2Val)}">2連 ${escapeHTML(nat2Val)}%</span>`
        : "";

      const rightTop = (winHTML || nat2HTML)
        ? [winHTML, nat2HTML].filter(Boolean).join(" / ")
        : "—";

      const rightBtm = [motor, boat].filter(Boolean).join(" / ");

      return `
        <div class="row">
          <div class="waku w${w}">${w || ""}</div>

          <div class="info">
            <div class="name">${escapeHTML(p.name || "—")}</div>
            <div class="sub">
              ${gradeText ? `<span>${escapeHTML(gradeText)}</span>` : ``}
              ${branchText ? `<span>${escapeHTML(branchText)}</span>` : ``}
              ${idText ? `<span class="muted">${escapeHTML(idText)}</span>` : ``}
              ${ageText ? `<span class="muted">${escapeHTML(ageText)}</span>` : ``}
            </div>
          </div>

          <div class="metric">
            <div class="st">${rightTop}</div>
            <div class="win">${escapeHTML(rightBtm || "")}</div>
          </div>
        </div>
      `;
    }

    function renderRaceJSON(r, json){
      $raceNoLabel.textContent = `${r}R`;

      const close = json?.race?.cutoff || json?.cutoff || "";
      $timeLabel.textContent = "締切: " + toHM(close);

      const dayLabel = String(json?.day_label || "").trim();
      $dayLabel.textContent = dayLabel || "—";

      const boatsRaw = Array.isArray(json?.race?.boats) ? json.race.boats : [];
      if (!boatsRaw.length){
        $table.innerHTML = `<div class="err">出走表が空です。<br>（race.boats が見つかりません）</div>`;
        return;
      }

      const boats6 = normalizeBoatsTo6(boatsRaw);
      $table.innerHTML = boats6.map(rowHTML).join("");
      requestAnimationFrame(() => setTopHeight());
    }

    function syncURLRace(r){
      const next = new URL(location.href);
      next.searchParams.set("race", String(r));
      history.replaceState(null, "", next.toString());
    }

    function buildCandidateUrls(r){
      const urls = [];

      if (jcd && jcd !== "00"){
        urls.push(`${BOT_RACES_BASE_URL}${encodeURIComponent(`${jcd}_${r}R.json`)}`);
      }

      urls.push(`${BOT_RACES_BASE_URL}${encodeURIComponent(`${venueName}_${r}R.json`)}`);
      return urls;
    }

    async function fetchRaceJSON(r){
      const urls = buildCandidateUrls(r);
      let lastErr = null;

      for (const url of urls){
        try{
          return await fetchJSON(url);
        }catch(e){
          lastErr = e;
        }
      }

      throw lastErr || new Error("race json not found");
    }

    async function setRace(r){
      r = clamp(Number(r) || 1, 1, 12);
      makeTabs(r);
      syncURLRace(r);

      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = "締切: --:--";
      $dayLabel.textContent = "—";
      $table.innerHTML = `<div class="err">データを読み込み中…</div>`;

      if (!venueName || venueName === "会場"){
        $table.innerHTML = `<div class="err">name が指定されていません。<br>例：race.html?jcd=20&name=若松</div>`;
        return;
      }

      try{
        const json = await fetchRaceJSON(r);
        renderRaceJSON(r, json);
      }catch(e){
        const urls = buildCandidateUrls(r).map(escapeHTML).join("<br>");
        $table.innerHTML = `<div class="err">JSONの取得に失敗しました。<br>${urls}<br>（ファイル未生成 or URL違い）</div>`;
      }
    }

    async function boot(){
      const initialRace = clamp(Number(qs.get("race") || 1) || 1, 1, 12);
      makeTabs(initialRace);
      await setRace(initialRace);
      requestAnimationFrame(() => {
        setTopHeight();
        centerActiveTab();
      });
    }

    document.getElementById("btnBack").addEventListener("click", () => history.back());
    boot();
  </script>
</body>
</html>
