<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7fb">
  <title>BOAT CORE</title>

  <link rel="stylesheet" href="./css/race-detail.css?v=62">
  <link rel="stylesheet" href="./css/race-course.css?v=22">
</head>

<body>

  <div class="raceTop" id="raceTop">

    <div class="raceHead">

      <div class="raceHead__left">

        <div class="raceBrand">BOAT CORE</div>

        <div class="raceVenueRow">
          <div id="venueName" class="raceVenue">—</div>
          <span id="gradeLabel" class="raceGrade">—</span>
          <div id="eventTitle" class="raceEventTitle">—</div>
        </div>

        <div class="raceMeta">
          <span class="metaChip" id="raceNoLabel">—R</span>
          <span class="metaChip" id="timeLabel">締切: --:--</span>
          <span class="metaChip" id="dayLabel">—</span>
        </div>

      </div>

      <button class="raceBtn" type="button" id="btnBack">
        戻る
      </button>

    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>

  </div>

  <div class="raceBody">

    <section class="section">

      <div class="sectionHead">
        <div class="sectionTitle">
          レース情報
        </div>
      </div>

      <div class="viewTabs" id="viewTabs">

        <button type="button" class="viewTab is-active" data-view="0">
          出走表
        </button>

        <button type="button" class="viewTab" data-view="1">
          コースデータ
        </button>

        <button type="button" class="viewTab" data-view="2">
          枠傾向
        </button>

      </div>

      <div class="viewPager" id="viewPager">

        <div class="viewTrack" id="viewTrack">

          <div class="viewPage">
            <div class="entryBoard">

              <div class="entryInnerTabs" id="entryInnerTabs" aria-label="出走表詳細切替">
                <button type="button" class="entryInnerTab is-active" data-entry-view="0">
                  出走表
                </button>
                <button type="button" class="entryInnerTab" data-entry-view="1">
                  今節成績
                </button>
              </div>

              <div class="entrySwipe" id="entrySwipe">
                <div class="entrySwipeTrack" id="entrySwipeTrack">

                  <div class="entrySwipePage">
                    <div class="entryHead">
                      <div class="entryHead__waku">
                        <span class="entryHeadMain">枠</span>
                      </div>

                      <div class="entryHead__name">
                        <span class="entryHeadMeta">登録番号 / 支部 / 年齢</span>
                        <span class="entryHeadMain">選手名</span>
                      </div>

                      <div class="entryHead__grade">
                        <span class="entryHeadMain">級</span>
                      </div>

                      <div class="entryHead__st">
                        <span class="entryHeadMain">平均</span>
                        <span class="entryHeadSub">ST</span>
                      </div>

                      <div class="entryHead__fl">
                        <span class="entryHeadMain">F</span>
                        <span class="entryHeadSub">L</span>
                      </div>

                      <div class="entryHead__nat">
                        <span class="entryHeadMain">全国</span>
                        <span class="entryHeadSub">勝率</span>
                        <span class="entryHeadSub">2連率</span>
                        <span class="entryHeadSub">3連率</span>
                      </div>

                      <div class="entryHead__loc">
                        <span class="entryHeadMain">当地</span>
                        <span class="entryHeadSub">勝率</span>
                        <span class="entryHeadSub">2連率</span>
                        <span class="entryHeadSub">3連率</span>
                      </div>

                      <div class="entryHead__motor">
                        <span class="entryHeadMain">モーター</span>
                        <span class="entryHeadSub">No.</span>
                        <span class="entryHeadSub">2連率</span>
                        <span class="entryHeadSub">3連率</span>
                      </div>
                    </div>

                    <div class="entryTable" id="entryTable"></div>
                  </div>

                  <div class="entrySwipePage">
                    <div class="meetPerfBoard" id="meetPerfBoard">

                      <div class="meetPerfHead" id="meetPerfHead">
                        <div class="meetPerfHead__waku">枠</div>
                        <div class="meetPerfHead__days" id="meetPerfDays"></div>
                      </div>

                      <div class="meetPerfTable" id="meetPerfTable">
                        <div class="meetPerfEmpty">今節成績を読み込み中…</div>
                      </div>

                    </div>
                  </div>

                </div>
              </div>

            </div>
          </div>

          <div class="viewPage">
            <div class="courseDataRoot" id="courseDataRoot"></div>
          </div>

          <div class="viewPage">
            <div class="panelPlaceholder">
              <div class="panelPlaceholder__title">
                枠傾向
              </div>

              <div class="panelPlaceholder__text">
                ここには会場別の<br>
                1枠逃げ率・2枠差し率などを表示予定
              </div>
            </div>
          </div>

        </div>

      </div>

    </section>

  </div>

  <script src="./js/race-course.js?v=11"></script>
  <script src="./js/race-detail.js?v=27"></script>

</body>
</html>
