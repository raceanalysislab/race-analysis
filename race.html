<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7fb" />
  <title>レース詳細</title>

  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --raceTopH: 112px;

      --bg:#f3f5f9;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --line:#e2e8f0;
      --line-soft:#eef2f7;

      --text:#0f172a;
      --muted:#64748b;
      --muted-2:#94a3b8;
      --accent:#2563eb;

      --shadow:0 2px 8px rgba(15,23,42,.06);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background:linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
      overscroll-behavior-y:none;
    }

    body{ padding-top:var(--safe-top); }

    .raceTop{
      position:sticky;
      top:0;
      z-index:50;
      padding:8px 10px 6px;
      background:rgba(246,247,251,.98);
      border-bottom:1px solid rgba(226,232,240,.92);
    }

    .raceHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      box-shadow:var(--shadow);
    }

    .raceHead__left{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .raceVenue{
      font-size:22px;
      line-height:1;
      font-weight:1000;
      letter-spacing:.01em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#0f172a;
    }

    .raceMeta{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      font-size:11px;
      line-height:1;
      color:var(--muted);
    }

    .metaChip{
      display:inline-flex;
      align-items:center;
      min-height:24px;
      padding:0 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel-soft);
      white-space:nowrap;
      font-weight:700;
    }

    .raceBtn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel-soft);
      color:var(--text);
      min-width:64px;
      height:38px;
      border-radius:11px;
      padding:0 12px;
      font-size:13px;
      font-weight:900;
      flex:0 0 auto;
    }

    .raceTabs{
      margin-top:8px;
      display:flex;
      gap:6px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      padding-bottom:2px;
      scroll-behavior:smooth;
    }
    .raceTabs::-webkit-scrollbar{ display:none; }

    .tab{
      flex:0 0 auto;
      appearance:none;
      min-width:52px;
      height:34px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      font-size:12px;
      font-weight:900;
      line-height:1;
    }

    .tab.is-active{
      background:linear-gradient(180deg, #2f7cff 0%, #2563eb 100%);
      color:#fff;
      border-color:transparent;
      box-shadow:0 4px 10px rgba(37,99,235,.14);
    }

    .raceBody{
      height:calc(100dvh - var(--raceTopH));
      overflow:hidden;
      padding:6px 10px calc(8px + var(--safe-bottom));
    }

    .section{
      height:100%;
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .sectionHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
      padding-bottom:6px;
      border-bottom:1px solid var(--line-soft);
      flex:0 0 auto;
    }

    .sectionTitle{
      font-size:13px;
      font-weight:1000;
      letter-spacing:.03em;
      color:#0f172a;
    }

    .sectionMeta{
      font-size:10px;
      line-height:1.3;
      color:var(--muted-2);
      text-align:right;
      white-space:nowrap;
    }

    .viewTabs{
      display:flex;
      gap:8px;
      margin-bottom:8px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      flex:0 0 auto;
    }
    .viewTabs::-webkit-scrollbar{ display:none; }

    .viewTab{
      appearance:none;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      height:36px;
      padding:0 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .viewTab.is-active{
      background:linear-gradient(180deg, #2f7cff 0%, #2563eb 100%);
      color:#fff;
      border-color:transparent;
      box-shadow:0 4px 10px rgba(37,99,235,.14);
    }

    .viewPager{
      flex:1 1 auto;
      min-height:0;
      overflow:hidden;
      position:relative;
      touch-action:pan-y;
    }

    .viewTrack{
      height:100%;
      display:flex;
      transition:transform .22s ease;
      will-change:transform;
    }

    .viewTrack.is-dragging{
      transition:none;
    }

    .viewPage{
      width:100%;
      min-width:100%;
      height:100%;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .table{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:6px;
      justify-content:space-between;
      overflow:auto;
      padding-right:1px;
    }

    .row{
      flex:1 1 0;
      min-height:0;
      display:flex;
      align-items:stretch;
      gap:10px;
      border-radius:15px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border:1px solid #e5eaf2;
      padding:8px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
    }

    .waku{
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:1000;
      letter-spacing:-.03em;
      flex:0 0 auto;
      align-self:center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.45),
        0 1px 2px rgba(15,23,42,.08);
      border:1px solid rgba(15,23,42,.08);
    }

    .waku.w1, .cdHead.w1{ background:linear-gradient(180deg, #ffffff 0%, #f7fafc 100%); color:#111827; }
    .waku.w2, .cdHead.w2{ background:linear-gradient(180deg, #253251 0%, #162033 100%); color:#ffffff; }
    .waku.w3, .cdHead.w3{ background:linear-gradient(180deg, #f06f63 0%, #dd564b 100%); color:#ffffff; }
    .waku.w4, .cdHead.w4{ background:linear-gradient(180deg, #568cff 0%, #376ceb 100%); color:#ffffff; }
    .waku.w5, .cdHead.w5{ background:linear-gradient(180deg, #f7dd58 0%, #edca3f 100%); color:#111827; }
    .waku.w6, .cdHead.w6{ background:linear-gradient(180deg, #6fd275 0%, #55c561 100%); color:#0f172a; }

    .info{
      min-width:0;
      flex:1 1 0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:5px;
      padding-right:2px;
    }

    .sub{
      font-size:10px;
      line-height:1.1;
      color:#64748b;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:700;
    }

    .nameRow{
      display:flex;
      align-items:center;
      min-width:0;
    }

    .name{
      min-width:0;
      max-width:100%;
      font-size:clamp(20px, 2.5vw, 24px);
      line-height:1;
      font-weight:700;
      color:#0f172a;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-.01em;
    }

    .metric{
      flex:0 0 40%;
      min-width:166px;
      display:grid;
      grid-template-columns:1fr 1fr;
      column-gap:14px;
      align-self:stretch;
      align-items:center;
      justify-items:center;
      font-variant-numeric:tabular-nums;
    }

    .metricCol{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .metricCol--nat{
      gap:8px;
    }

    .metricCol--motor{
      gap:5px;
    }

    .metricHead{
      font-size:11px;
      line-height:1;
      font-weight:900;
      color:#475569;
      white-space:nowrap;
      text-align:center;
      width:100%;
    }

    .metricVal{
      font-size:22px;
      line-height:1;
      font-weight:900;
      color:#0f172a;
      white-space:nowrap;
      text-align:center;
      width:100%;
    }

    .metricSub{
      font-size:17px;
      line-height:1;
      font-weight:900;
      color:#0f172a;
      white-space:nowrap;
      text-align:center;
      width:100%;
      margin-top:-1px;
    }

    .metricVal--motor{
      font-size:18px;
      margin-top:-1px;
    }

    .note{
      margin-top:6px;
      padding:0 2px;
      color:var(--muted);
      font-size:10px;
      line-height:1.4;
      flex:0 0 auto;
    }

    .panelPlaceholder{
      flex:1 1 auto;
      min-height:0;
      border:1px solid #e5eaf2;
      border-radius:16px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      padding:18px 14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:#334155;
    }

    .panelPlaceholder__title{
      font-size:18px;
      font-weight:1000;
      color:#0f172a;
      margin-bottom:10px;
    }

    .panelPlaceholder__text{
      font-size:12px;
      line-height:1.8;
      color:#64748b;
      max-width:260px;
    }

    .courseWrap{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:auto;
      padding-right:1px;
    }

    .courseInnerTabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      flex:0 0 auto;
    }
    .courseInnerTabs::-webkit-scrollbar{ display:none; }

    .courseInnerTab{
      appearance:none;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      height:34px;
      padding:0 12px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .courseInnerTab.is-active{
      background:#0f172a;
      color:#fff;
      border-color:#0f172a;
    }

    .courseBlock{
      border:1px solid #e5eaf2;
      border-radius:16px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
      padding:12px;
      flex:0 0 auto;
    }

    .courseBlockTitle{
      font-size:18px;
      line-height:1.1;
      font-weight:1000;
      color:#0f172a;
      margin-bottom:10px;
    }

    .courseBlockSub{
      font-size:11px;
      line-height:1.5;
      color:#64748b;
      margin-top:-4px;
      margin-bottom:10px;
    }

    .courseScroll{
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      padding-bottom:2px;
    }
    .courseScroll::-webkit-scrollbar{ display:none; }

    .courseTable{
      min-width:720px;
      border:1px solid #dbe4ef;
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }

    .courseGrid{
      display:grid;
      grid-template-columns:128px repeat(6, 1fr);
    }

    .cdCell,
    .cdRowHead,
    .cdHead{
      min-height:56px;
      border-right:1px solid #dbe4ef;
      border-bottom:1px solid #dbe4ef;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 6px;
      text-align:center;
      font-variant-numeric:tabular-nums;
      background:#fff;
    }

    .cdHead{
      font-size:19px;
      font-weight:1000;
      min-height:48px;
    }

    .cdHead--blank{
      background:#f8fafc;
      color:#64748b;
      font-size:11px;
      font-weight:800;
    }

    .cdRowHead{
      background:#f8fafc;
      color:#334155;
      justify-content:flex-start;
      padding-left:12px;
      font-size:12px;
      font-weight:900;
      line-height:1.35;
    }

    .cdCell{
      flex-direction:column;
      gap:2px;
      color:#0f172a;
    }

    .cdCell strong{
      font-size:17px;
      line-height:1;
      font-weight:1000;
    }

    .cdCell span{
      font-size:11px;
      line-height:1.1;
      color:#475569;
      font-weight:700;
    }

    .cdCell--pair{
      gap:6px;
    }

    .cdPair{
      display:flex;
      flex-direction:column;
      gap:2px;
      width:100%;
    }

    .cdPairLabel{
      font-size:10px;
      line-height:1;
      color:#64748b;
      font-weight:800;
    }

    .cdPairVal{
      font-size:16px;
      line-height:1;
      font-weight:1000;
      color:#0f172a;
    }

    .cdCell--kimarite strong{
      font-size:15px;
    }

    .cdHint{
      margin-top:8px;
      font-size:10px;
      line-height:1.6;
      color:#64748b;
    }

    .err{
      padding:12px 14px;
      border-radius:14px;
      border:1px dashed #cbd5e1;
      background:#f8fafc;
      color:#475569;
      font-size:12px;
      line-height:1.7;
      word-break:break-word;
    }

    @media (max-width: 390px){
      .waku{
        width:38px;
        height:38px;
        font-size:20px;
        border-radius:12px;
      }

      .sub{ font-size:9px; }

      .metric{
        min-width:148px;
        column-gap:10px;
      }

      .metricHead{ font-size:10px; }
      .metricVal{ font-size:19px; }
      .metricSub{ font-size:15px; }
      .metricVal--motor{ font-size:16px; }

      .viewTab{
        height:34px;
        padding:0 12px;
        font-size:11px;
      }

      .courseGrid{
        grid-template-columns:116px repeat(6, 1fr);
      }

      .cdRowHead{
        font-size:11px;
        padding-left:10px;
      }

      .cdCell strong{
        font-size:15px;
      }

      .cdPairVal{
        font-size:14px;
      }
    }
  </style>
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>
        <div class="raceMeta">
          <span class="metaChip" id="raceNoLabel">—R</span>
          <span class="metaChip" id="timeLabel">締切: --:--</span>
          <span class="metaChip" id="dayLabel">—</span>
        </div>
      </div>
      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody">
    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle">レース情報</div>
        <div class="sectionMeta">無料版は<br>選手データ確認のみ</div>
      </div>

      <div class="viewTabs" id="viewTabs">
        <button type="button" class="viewTab is-active" data-view="0">出走表</button>
        <button type="button" class="viewTab" data-view="1">コースデータ</button>
        <button type="button" class="viewTab" data-view="2">過去枠番成績</button>
      </div>

      <div class="viewPager" id="viewPager">
        <div class="viewTrack" id="viewTrack">
          <div class="viewPage">
            <div class="table" id="table"></div>
          </div>

          <div class="viewPage">
            <div class="courseWrap" id="courseDataPanel">
              <div class="courseInnerTabs" id="courseInnerTabs">
                <button type="button" class="courseInnerTab is-active" data-course-tab="year">コース別直近1年</button>
                <button type="button" class="courseInnerTab" data-course-tab="local">コース別当地直近5年</button>
              </div>

              <div id="courseYearView">
                <div class="courseBlock">
                  <div class="courseBlockTitle">コース別直近1年</div>
                  <div class="courseBlockSub">平均ST と 今節平均ST を並べて比較できます。</div>
                  <div class="courseScroll" id="courseYearScroll"></div>
                  <div class="cdHint">※ いまは表示UI先行です。データ接続後に自動で値を流し込みます。</div>
                </div>
              </div>

              <div id="courseLocalView" style="display:none;">
                <div class="courseBlock">
                  <div class="courseBlockTitle">コース別当地直近5年</div>
                  <div class="courseBlockSub">当地実績を別タブで確認できます。</div>
                  <div class="courseScroll" id="courseLocalScroll"></div>
                  <div class="cdHint">※ いまは表示UI先行です。データ接続後に自動で値を流し込みます。</div>
                </div>
              </div>
            </div>
          </div>

          <div class="viewPage">
            <div class="panelPlaceholder" id="frameStatsPanel">
              <div class="panelPlaceholder__title">過去枠番成績</div>
              <div class="panelPlaceholder__text">
                ここには会場別・枠番別の成績や傾向を表示予定です。<br>
                次段階でデータをつないで実装します。
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="note">
        ※無料版は「各選手データの確認」専用です。予想は表示しません。
      </div>
    </section>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const venueName = decodeURIComponent(qs.get("name") || "会場");
    const jcd = String(qs.get("jcd") || "").padStart(2, "0");

    const $ = (id) => document.getElementById(id);
    const $tabs = $("tabs");
    const $table = $("table");
    const $raceNoLabel = $("raceNoLabel");
    const $timeLabel = $("timeLabel");
    const $dayLabel = $("dayLabel");
    const $raceTop = $("raceTop");
    const $viewTabs = $("viewTabs");
    const $viewTrack = $("viewTrack");
    const $viewPager = $("viewPager");
    const $courseInnerTabs = $("courseInnerTabs");
    const $courseYearView = $("courseYearView");
    const $courseLocalView = $("courseLocalView");
    const $courseYearScroll = $("courseYearScroll");
    const $courseLocalScroll = $("courseLocalScroll");

    const BOT_RACES_BASE_URL =
      "https://cdn.jsdelivr.net/gh/raceanalysislab/race-data-bot@main/data/site/races/";

    const DATE_CHECK_INTERVAL_MS = 15 * 1000;

    let currentRace = 1;
    let currentView = 0;
    let currentCourseTab = "year";
    let lastLoadedDataDate = "";
    let lastSeenLocalDate = getLocalYMD();
    let isLoadingRace = false;
    let currentBoats = [];

    let dragStartX = 0;
    let dragCurrentX = 0;
    let isDraggingView = false;
    let dragPointerId = null;

    $("venueName").textContent = venueName;

    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));

    const safeNum = (v) => {
      if (v === undefined || v === null || v === "") return "—";
      const n = Number(v);
      return Number.isFinite(n) ? n.toFixed(2) : "—";
    };

    const safePct = (v) => {
      if (v === undefined || v === null || v === "") return "—";
      const n = Number(v);
      return Number.isFinite(n) ? `${n.toFixed(2)}%` : "—";
    };

    const safeInt = (v) => {
      if (v === undefined || v === null || v === "") return "—";
      const n = Number(v);
      return Number.isFinite(n) ? String(Math.trunc(n)) : "—";
    };

    const toHM = (x) => {
      const m = String(x || "").match(/(\d{1,2}):(\d{2})/);
      return m ? `${String(m[1]).padStart(2, "0")}:${m[2]}` : "--:--";
    };

    function getLocalYMD() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    const setTopHeight = () => {
      const h = $raceTop.getBoundingClientRect().height || 112;
      document.documentElement.style.setProperty("--raceTopH", `${Math.ceil(h)}px`);
    };

    const fetchJSON = async (url) => {
      const bust = url.includes("?") ? `&t=${Date.now()}` : `?t=${Date.now()}`;
      const res = await fetch(url + bust, { cache:"no-store" });
      if (!res.ok) throw new Error(`failed: ${url}`);
      return res.json();
    };

    const centerActiveTab = () => {
      const active = $tabs.querySelector(".tab.is-active");
      if (!active) return;
      const offset = active.offsetLeft - ($tabs.clientWidth / 2) + (active.clientWidth / 2);
      $tabs.scrollTo({ left: Math.max(0, offset), behavior: "smooth" });
    };

    function makeTabs(active){
      $tabs.innerHTML = Array.from({ length: 12 }, (_, i) => {
        const r = i + 1;
        return `<button type="button" class="tab${r === active ? " is-active" : ""}" data-race="${r}">${r}R</button>`;
      }).join("");

      $tabs.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => setRace(Number(btn.dataset.race)));
      });

      requestAnimationFrame(centerActiveTab);
    }

    function normalizeBoatsTo6(boats){
      const byWaku = new Map();
      const rest = [];

      boats.forEach((b) => {
        const w = Number(b?.waku);
        if (w >= 1 && w <= 6 && !byWaku.has(w)) byWaku.set(w, b);
        else rest.push(b);
      });

      for (let w = 1; w <= 6; w++){
        if (!byWaku.has(w) && rest.length) byWaku.set(w, { ...rest.shift(), waku: w });
      }

      return Array.from({ length: 6 }, (_, i) => {
        const w = i + 1;
        return byWaku.get(w) || {
          waku:w,
          name:"—",
          regno:"",
          branch:"",
          age:"",
          grade:"",
          nat_win:null,
          motor_no:null,
          motor_2:null
        };
      });
    }

    function metricHTML(p){
      return `
        <div class="metric">
          <div class="metricCol metricCol--nat">
            <div class="metricHead">全国勝率</div>
            <div class="metricVal">${esc(safeNum(p.nat_win))}</div>
          </div>

          <div class="metricCol metricCol--motor">
            <div class="metricHead">モーターNo.</div>
            <div class="metricSub">${esc(safeInt(p.motor_no))}</div>
            <div class="metricVal metricVal--motor">${esc(safeNum(p.motor_2))}</div>
          </div>
        </div>
      `;
    }

    function rowHTML(p){
      const regno = p.regno || p.id || "—";
      const grade = p.grade || "—";
      const branch = p.branch || "—";
      const age = (p.age !== undefined && p.age !== null && p.age !== "") ? `${p.age}歳` : "—";

      return `
        <div class="row">
          <div class="waku w${Number(p.waku) || 0}">${Number(p.waku) || ""}</div>

          <div class="info">
            <div class="sub">${esc(regno)} / ${esc(grade)} / ${esc(branch)} / ${esc(age)}</div>
            <div class="nameRow">
              <div class="name">${esc(p.name || "—")}</div>
            </div>
          </div>

          ${metricHTML(p)}
        </div>
      `;
    }

    function setView(index, animate = true){
      currentView = clamp(index, 0, 2);

      const tabs = Array.from($viewTabs.querySelectorAll(".viewTab"));
      tabs.forEach((btn, i) => {
        btn.classList.toggle("is-active", i === currentView);
      });

      if (animate) {
        $viewTrack.classList.remove("is-dragging");
      } else {
        $viewTrack.classList.add("is-dragging");
      }

      $viewTrack.style.transform = `translate3d(${-100 * currentView}%, 0, 0)`;
    }

    function setupViewTabs(){
      Array.from($viewTabs.querySelectorAll(".viewTab")).forEach((btn) => {
        btn.addEventListener("click", () => {
          setView(Number(btn.dataset.view), true);
        });
      });
    }

    function setCourseTab(tabName){
      currentCourseTab = tabName === "local" ? "local" : "year";

      Array.from($courseInnerTabs.querySelectorAll(".courseInnerTab")).forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.courseTab === currentCourseTab);
      });

      $courseYearView.style.display = currentCourseTab === "year" ? "" : "none";
      $courseLocalView.style.display = currentCourseTab === "local" ? "" : "none";
    }

    function setupCourseTabs(){
      Array.from($courseInnerTabs.querySelectorAll(".courseInnerTab")).forEach((btn) => {
        btn.addEventListener("click", () => setCourseTab(btn.dataset.courseTab));
      });
    }

    function setupViewSwipe(){
      if (!$viewPager || !$viewTrack) return;

      $viewPager.addEventListener("pointerdown", (e) => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        isDraggingView = true;
        dragPointerId = e.pointerId;
        dragStartX = e.clientX;
        dragCurrentX = e.clientX;
        $viewTrack.classList.add("is-dragging");
        try { $viewPager.setPointerCapture(e.pointerId); } catch (_) {}
      });

      $viewPager.addEventListener("pointermove", (e) => {
        if (!isDraggingView || e.pointerId !== dragPointerId) return;
        dragCurrentX = e.clientX;
        const width = $viewPager.clientWidth || 1;
        const deltaX = dragCurrentX - dragStartX;
        const basePct = -100 * currentView;
        const deltaPct = (deltaX / width) * 100;
        $viewTrack.style.transform = `translate3d(${basePct + deltaPct}%, 0, 0)`;
      });

      const finishDrag = (e) => {
        if (!isDraggingView || (e && e.pointerId !== dragPointerId)) return;

        const width = $viewPager.clientWidth || 1;
        const deltaX = dragCurrentX - dragStartX;
        const threshold = Math.min(90, width * 0.18);

        isDraggingView = false;
        dragPointerId = null;

        if (deltaX <= -threshold && currentView < 2) {
          setView(currentView + 1, true);
          return;
        }

        if (deltaX >= threshold && currentView > 0) {
          setView(currentView - 1, true);
          return;
        }

        setView(currentView, true);
      };

      $viewPager.addEventListener("pointerup", finishDrag);
      $viewPager.addEventListener("pointercancel", finishDrag);
      $viewPager.addEventListener("pointerleave", finishDrag);
    }

    function getBoatShortName(name){
      const s = String(name || "").trim();
      if (!s) return "—";
      return s.length <= 4 ? s : s.slice(0, 4);
    }

    function createYearCourseStub(boat){
      return {
        avg_st: null,
        series_avg_st: null,
        win_rate: null,
        kimarite: { sashi: null, maku: null, makuzashi: null },
        ren2_rate: null,
        ren3_rate: null
      };
    }

    function createLocalCourseStub(boat){
      return {
        win_rate: null,
        kimarite: { sashi: null, maku: null, makuzashi: null },
        ren2_rate: null,
        ren3_rate: null
      };
    }

    function mergeCourseYearData(boats, raceObj){
      const src = raceObj?.course_data?.last1y || raceObj?.course_last1y || {};
      return boats.map((boat) => {
        const key1 = String(boat.waku);
        const key2 = String(boat.regno || "");
        const found = src[key1] || src[key2] || {};
        return { ...createYearCourseStub(boat), ...found, kimarite: { ...createYearCourseStub(boat).kimarite, ...(found.kimarite || {}) } };
      });
    }

    function mergeCourseLocalData(boats, raceObj){
      const src = raceObj?.course_data?.local_last5y || raceObj?.local_course_last5y || {};
      return boats.map((boat) => {
        const key1 = String(boat.waku);
        const key2 = String(boat.regno || "");
        const found = src[key1] || src[key2] || {};
        return { ...createLocalCourseStub(boat), ...found, kimarite: { ...createLocalCourseStub(boat).kimarite, ...(found.kimarite || {}) } };
      });
    }

    function buildCourseTableHTML(boats, rowDefs){
      const head = `
        <div class="courseGrid">
          <div class="cdHead cdHead--blank">項目</div>
          ${boats.map((b) => `<div class="cdHead w${Number(b.waku) || 0}">${esc(String(b.waku || ""))}</div>`).join("")}
        </div>
      `;

      const rows = rowDefs.map((row) => {
        return `
          <div class="courseGrid">
            <div class="cdRowHead">${row.label}</div>
            ${boats.map((boat, idx) => row.render(boat, idx)).join("")}
          </div>
        `;
      }).join("");

      return `<div class="courseTable">${head}${rows}</div>`;
    }

    function renderYearCourseTable(boats, rows){
      const defs = [
        {
          label: "平均ST / 今節平均ST",
          render: (_, idx) => `
            <div class="cdCell cdCell--pair">
              <div class="cdPair">
                <div class="cdPairLabel">平均ST</div>
                <div class="cdPairVal">${esc(safeNum(rows[idx].avg_st))}</div>
              </div>
              <div class="cdPair">
                <div class="cdPairLabel">今節平均ST</div>
                <div class="cdPairVal">${esc(safeNum(rows[idx].series_avg_st))}</div>
              </div>
            </div>
          `
        },
        {
          label: "コース別勝率",
          render: (_, idx) => `<div class="cdCell"><strong>${esc(safePct(rows[idx].win_rate))}</strong></div>`
        },
        {
          label: "差し / 捲り / 捲り差し",
          render: (_, idx) => {
            const k = rows[idx].kimarite || {};
            const txt = `${safeInt(k.sashi)}/${safeInt(k.maku)}/${safeInt(k.makuzashi)}`;
            return `<div class="cdCell cdCell--kimarite"><strong>${esc(txt)}</strong></div>`;
          }
        },
        {
          label: "コース別2着内率",
          render: (_, idx) => `<div class="cdCell"><strong>${esc(safePct(rows[idx].ren2_rate))}</strong></div>`
        },
        {
          label: "コース別3着内率",
          render: (_, idx) => `<div class="cdCell"><strong>${esc(safePct(rows[idx].ren3_rate))}</strong></div>`
        }
      ];

      $courseYearScroll.innerHTML = buildCourseTableHTML(boats, defs);
    }

    function renderLocalCourseTable(boats, rows){
      const defs = [
        {
          label: "当地コース別勝率",
          render: (_, idx) => `<div class="cdCell"><strong>${esc(safePct(rows[idx].win_rate))}</strong></div>`
        },
        {
          label: "差し / 捲り / 捲り差し",
          render: (_, idx) => {
            const k = rows[idx].kimarite || {};
            const txt = `${safeInt(k.sashi)}/${safeInt(k.maku)}/${safeInt(k.makuzashi)}`;
            return `<div class="cdCell cdCell--kimarite"><strong>${esc(txt)}</strong></div>`;
          }
        },
        {
          label: "当地コース別2着内率",
          render: (_, idx) => `<div class="cdCell"><strong>${esc(safePct(rows[idx].ren2_rate))}</strong></div>`
        },
        {
          label: "当地コース別3着内率",
          render: (_, idx) => `<div class="cdCell"><strong>${esc(safePct(rows[idx].ren3_rate))}</strong></div>`
        }
      ];

      $courseLocalScroll.innerHTML = buildCourseTableHTML(boats, defs);
    }

    function renderCourseUI(boats, raceObj){
      currentBoats = boats.slice();

      const yearRows = mergeCourseYearData(boats, raceObj);
      const localRows = mergeCourseLocalData(boats, raceObj);

      renderYearCourseTable(boats, yearRows);
      renderLocalCourseTable(boats, localRows);
    }

    function renderRaceJSON(r, json){
      const raceObj = json?.race || {};
      const dataDate = String(json?.date || raceObj?.date || "").trim();

      currentRace = r;
      lastLoadedDataDate = dataDate || lastLoadedDataDate;

      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = `締切: ${toHM(raceObj?.cutoff || json?.cutoff || "")}`;
      $dayLabel.textContent = String(json?.day_label || "").trim() || "—";

      const boatsRaw = Array.isArray(raceObj?.boats) ? raceObj.boats : [];
      if (!boatsRaw.length){
        $table.innerHTML = `<div class="err">出走表が空です。<br>（race.boats が見つかりません）</div>`;
        $courseYearScroll.innerHTML = `<div class="err">コースデータの元になる出走表がありません。</div>`;
        $courseLocalScroll.innerHTML = `<div class="err">コースデータの元になる出走表がありません。</div>`;
        return;
      }

      const boats = normalizeBoatsTo6(boatsRaw);
      currentBoats = boats;
      $table.innerHTML = boats.map(rowHTML).join("");
      renderCourseUI(boats, raceObj);

      requestAnimationFrame(setTopHeight);
    }

    function syncURLRace(r){
      const next = new URL(location.href);
      next.searchParams.set("race", String(r));
      history.replaceState(null, "", next.toString());
    }

    function buildCandidateUrls(r){
      return [
        ...(jcd && jcd !== "00" ? [`${BOT_RACES_BASE_URL}${encodeURIComponent(`${jcd}_${r}R.json`)}`] : []),
        `${BOT_RACES_BASE_URL}${encodeURIComponent(`${venueName}_${r}R.json`)}`
      ];
    }

    async function fetchRaceJSON(r){
      let lastErr = null;
      for (const url of buildCandidateUrls(r)){
        try {
          return await fetchJSON(url);
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error("race json not found");
    }

    async function setRace(r){
      r = clamp(Number(r) || 1, 1, 12);
      currentRace = r;
      makeTabs(r);
      syncURLRace(r);

      if (!venueName || venueName === "会場"){
        $raceNoLabel.textContent = `${r}R`;
        $timeLabel.textContent = "締切: --:--";
        $dayLabel.textContent = "—";
        $table.innerHTML = `<div class="err">name が指定されていません。<br>例：race.html?jcd=20&name=若松</div>`;
        return;
      }

      if (isLoadingRace) return;
      isLoadingRace = true;

      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = "締切: --:--";
      $dayLabel.textContent = "—";
      $table.innerHTML = `<div class="err">データを読み込み中…</div>`;
      $courseYearScroll.innerHTML = `<div class="err">データを読み込み中…</div>`;
      $courseLocalScroll.innerHTML = `<div class="err">データを読み込み中…</div>`;

      try {
        renderRaceJSON(r, await fetchRaceJSON(r));
      } catch (e) {
        const errHtml = `<div class="err">JSONの取得に失敗しました。<br>${buildCandidateUrls(r).map(esc).join("<br>")}<br>（ファイル未生成 or URL違い）</div>`;
        $table.innerHTML = errHtml;
        $courseYearScroll.innerHTML = errHtml;
        $courseLocalScroll.innerHTML = errHtml;
      } finally {
        isLoadingRace = false;
      }
    }

    async function reloadIfDateChanged(){
      const currentLocalDate = getLocalYMD();
      const localDateChanged = currentLocalDate !== lastSeenLocalDate;
      const dataDateMismatch = lastLoadedDataDate && lastLoadedDataDate !== currentLocalDate;

      if (localDateChanged || dataDateMismatch) {
        lastSeenLocalDate = currentLocalDate;
        await setRace(currentRace);
      }
    }

    async function boot(){
      const initialRace = clamp(Number(qs.get("race") || 1) || 1, 1, 12);
      currentRace = initialRace;
      makeTabs(initialRace);
      setupViewTabs();
      setupViewSwipe();
      setupCourseTabs();
      setView(0, false);
      setCourseTab("year");
      await setRace(initialRace);
      requestAnimationFrame(() => {
        setTopHeight();
        centerActiveTab();
      });
    }

    addEventListener("resize", () => {
      setTopHeight();
      setView(currentView, false);
    }, { passive:true });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        setTopHeight();
        setView(currentView, false);
        setRace(currentRace);
      }
    });

    setInterval(() => {
      if (document.visibilityState === "visible") {
        reloadIfDateChanged();
      }
    }, DATE_CHECK_INTERVAL_MS);

    $("btnBack").addEventListener("click", () => history.back());
    requestAnimationFrame(setTopHeight);
    boot();
  </script>
</body>
</html>
