<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7fb" />
  <title>レース詳細</title>

  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --raceTopH: 118px;

      --bg:#f3f5f9;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --line:#e2e8f0;
      --line-soft:#eef2f7;

      --text:#0f172a;
      --muted:#64748b;
      --muted-2:#94a3b8;
      --accent:#2563eb;

      --shadow:
        0 8px 24px rgba(15,23,42,.06),
        0 1px 0 rgba(255,255,255,.9) inset;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background:linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
      overscroll-behavior-y:none;
    }

    body{ padding-top:var(--safe-top); }

    .raceTop{
      position:sticky;
      top:0;
      z-index:50;
      padding:10px 12px 8px;
      background:rgba(246,247,251,.94);
      backdrop-filter:blur(12px) saturate(120%);
      border-bottom:1px solid rgba(226,232,240,.9);
    }

    .raceHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
    }

    .raceHead__left{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .raceVenue{
      font-size:24px;
      line-height:1.02;
      font-weight:1000;
      letter-spacing:.01em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#0f172a;
    }

    .raceMeta{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      font-size:11px;
      line-height:1;
      color:var(--muted);
    }

    .metaChip{
      display:inline-flex;
      align-items:center;
      min-height:26px;
      padding:0 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel-soft);
      white-space:nowrap;
      font-weight:700;
    }

    .raceBtn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel-soft);
      color:var(--text);
      min-width:68px;
      height:40px;
      border-radius:12px;
      padding:0 12px;
      font-size:13px;
      font-weight:900;
      flex:0 0 auto;
    }

    .raceTabs{
      margin-top:10px;
      display:flex;
      gap:7px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      padding-bottom:2px;
      scroll-behavior:smooth;
    }
    .raceTabs::-webkit-scrollbar{ display:none; }

    .tab{
      flex:0 0 auto;
      appearance:none;
      min-width:54px;
      height:36px;
      padding:0 11px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      font-size:13px;
      font-weight:900;
      line-height:1;
    }

    .tab.is-active{
      background:linear-gradient(180deg, #2f7cff 0%, #2563eb 100%);
      color:#fff;
      border-color:transparent;
      box-shadow:0 8px 18px rgba(37,99,235,.18);
    }

    .raceBody{
      height:calc(100dvh - var(--raceTopH));
      overflow:hidden;
      padding:8px 12px calc(10px + var(--safe-bottom));
    }

    .section{
      height:100%;
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:10px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .sectionHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      padding-bottom:8px;
      border-bottom:1px solid var(--line-soft);
      flex:0 0 auto;
    }

    .sectionTitle{
      font-size:13px;
      font-weight:1000;
      letter-spacing:.03em;
      color:#0f172a;
    }

    .sectionMeta{
      font-size:10px;
      line-height:1.35;
      color:var(--muted-2);
      text-align:right;
      white-space:nowrap;
    }

    .table{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:7px;
      justify-content:space-between;
    }

    .row{
      flex:1 1 0;
      min-height:0;
      display:grid;
      grid-template-columns: 40px minmax(0, 1fr) minmax(188px, 49%);
      gap:10px;
      align-items:center;
      border-radius:16px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border:1px solid #e5eaf2;
      padding:8px;
    }

    .waku{
      width:40px;
      height:40px;
      border-radius:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:1000;
      letter-spacing:-.03em;
      border:1px solid rgba(15,23,42,.08);
    }
    .waku.w1{ background:#ffffff; color:#111827; }
    .waku.w2{ background:#1f2937; color:#ffffff; }
    .waku.w3{ background:#ef4444; color:#ffffff; }
    .waku.w4{ background:#2563eb; color:#ffffff; }
    .waku.w5{ background:#facc15; color:#111827; }
    .waku.w6{ background:#22c55e; color:#111827; }

    .info{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
    }

    .sub{
      font-size:10px;
      line-height:1.15;
      color:#64748b;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:700;
    }

    .name{
      min-width:0;
      font-size:22px;
      line-height:1;
      font-weight:1000;
      color:#0f172a;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:.01em;
    }

    .metric{
      min-width:0;
      width:100%;
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(3, auto);
      column-gap:14px;
      row-gap:5px;
      align-content:center;
      justify-items:center;
      text-align:center;
      font-variant-numeric: tabular-nums;
    }

    .metricHead{
      width:100%;
      font-size:11px;
      line-height:1.05;
      font-weight:1000;
      color:#475569;
      white-space:nowrap;
    }

    .metricSub{
      width:100%;
      font-size:9px;
      line-height:1;
      font-weight:900;
      color:#94a3b8;
      white-space:nowrap;
    }

    .metricVal{
      width:100%;
      font-size:13px;
      line-height:1.05;
      font-weight:1000;
      color:#0f172a;
      white-space:nowrap;
    }

    .note{
      margin-top:8px;
      padding:0 2px;
      color:var(--muted);
      font-size:11px;
      line-height:1.45;
      flex:0 0 auto;
    }

    .err{
      padding:12px 14px;
      border-radius:14px;
      border:1px dashed #cbd5e1;
      background:#f8fafc;
      color:#475569;
      font-size:12px;
      line-height:1.7;
      word-break:break-word;
    }

    @media (max-width: 390px){
      :root{ --raceTopH: 112px; }

      .raceTop{ padding:8px 10px 7px; }
      .raceHead{ padding:10px; }
      .raceVenue{ font-size:22px; }

      .raceBody{
        padding-left:10px;
        padding-right:10px;
      }

      .section{ padding:9px; }

      .row{
        grid-template-columns: 36px minmax(0, 1fr) minmax(164px, 48%);
        gap:8px;
        padding:7px;
        border-radius:15px;
      }

      .waku{
        width:36px;
        height:36px;
        font-size:20px;
        border-radius:11px;
      }

      .sub{ font-size:9px; }
      .name{ font-size:19px; }
      .metric{ column-gap:10px; row-gap:4px; }
      .metricHead{ font-size:10px; }
      .metricSub{ font-size:8px; }
      .metricVal{ font-size:12px; }
    }

    @media (max-height: 760px){
      :root{ --raceTopH: 108px; }

      .raceTop{ padding:7px 10px 6px; }
      .raceHead{ padding:10px; }
      .raceTabs{ margin-top:8px; }
      .raceBody{ padding-top:6px; }

      .section{ padding:8px; }
      .sectionHead{
        margin-bottom:6px;
        padding-bottom:6px;
      }

      .table{ gap:6px; }

      .row{
        padding:6px 7px;
        grid-template-columns: 34px minmax(0, 1fr) minmax(156px, 48%);
      }

      .waku{
        width:34px;
        height:34px;
        font-size:18px;
        border-radius:10px;
      }

      .sub{ font-size:9px; }
      .name{ font-size:18px; }
      .metric{ column-gap:10px; row-gap:4px; }
      .metricHead{ font-size:10px; }
      .metricSub{ font-size:8px; }
      .metricVal{ font-size:12px; }
      .note{ font-size:10px; margin-top:6px; }
    }
  </style>
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>
        <div class="raceMeta">
          <span class="metaChip" id="raceNoLabel">—R</span>
          <span class="metaChip" id="timeLabel">締切: --:--</span>
          <span class="metaChip" id="dayLabel">—</span>
        </div>
      </div>
      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody" id="raceBody">
    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle">出走表</div>
        <div class="sectionMeta">無料版は<br>選手データ確認のみ</div>
      </div>

      <div class="table" id="table"></div>

      <div class="note" id="note">
        ※無料版は「各選手データの確認」専用です。予想は表示しません。
      </div>
    </section>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const venueName = decodeURIComponent(qs.get("name") || "会場");
    const jcd = String(qs.get("jcd") || "").padStart(2, "0");

    const $ = (id) => document.getElementById(id);
    const $tabs = $("tabs");
    const $table = $("table");
    const $raceNoLabel = $("raceNoLabel");
    const $timeLabel = $("timeLabel");
    const $dayLabel = $("dayLabel");
    const $raceTop = $("raceTop");

    const BOT_RACES_BASE_URL =
      "https://cdn.jsdelivr.net/gh/raceanalysislab/race-data-bot@main/data/site/races/";

    $("venueName").textContent = venueName;

    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const safeNum = (v) => {
      if (v === undefined || v === null || v === "") return "—";
      const n = Number(v);
      return Number.isFinite(n) ? n.toFixed(2) : "—";
    };
    const toHM = (x) => {
      const m = String(x || "").match(/(\d{1,2}):(\d{2})/);
      return m ? `${String(m[1]).padStart(2, "0")}:${m[2]}` : "--:--";
    };
    const setTopHeight = () => {
      const h = $raceTop.getBoundingClientRect().height || 118;
      document.documentElement.style.setProperty("--raceTopH", `${Math.ceil(h)}px`);
    };
    const fetchJSON = async (url) => {
      const bust = url.includes("?") ? `&t=${Date.now()}` : `?t=${Date.now()}`;
      const res = await fetch(url + bust, { cache:"no-store" });
      if (!res.ok) throw new Error(`failed: ${url}`);
      return res.json();
    };
    const centerActiveTab = () => {
      const active = $tabs.querySelector(".tab.is-active");
      if (!active) return;
      const offset = active.offsetLeft - ($tabs.clientWidth / 2) + (active.clientWidth / 2);
      $tabs.scrollTo({ left: Math.max(0, offset), behavior: "smooth" });
    };

    function makeTabs(active){
      $tabs.innerHTML = Array.from({ length: 12 }, (_, i) => {
        const r = i + 1;
        return `<button type="button" class="tab${r === active ? " is-active" : ""}" data-race="${r}">${r}R</button>`;
      }).join("");
      $tabs.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => setRace(Number(btn.dataset.race)));
      });
      requestAnimationFrame(centerActiveTab);
    }

    function normalizeBoatsTo6(boats){
      const byWaku = new Map();
      const rest = [];

      boats.forEach((b) => {
        const w = Number(b?.waku);
        if (w >= 1 && w <= 6 && !byWaku.has(w)) byWaku.set(w, b);
        else rest.push(b);
      });

      for (let w = 1; w <= 6; w++){
        if (!byWaku.has(w) && rest.length) byWaku.set(w, { ...rest.shift(), waku: w });
      }

      return Array.from({ length: 6 }, (_, i) => {
        const w = i + 1;
        return byWaku.get(w) || {
          waku:w,
          name:"—",
          regno:"",
          branch:"",
          age:"",
          grade:"",
          nat_win:null,
          nat_2:null,
          nat_3:null,
          loc_win:null,
          loc_2:null,
          loc_3:null,
          motor_no:null,
          motor_2:null,
          motor_3:null,
          boat_no:null,
          boat_2:null,
          boat_3:null
        };
      });
    }

    const metricHeadHTML = () => `
      <div class="metricHead">全国</div>
      <div class="metricHead">当地</div>
      <div class="metricHead">モーター</div>
      <div class="metricHead">ボート</div>
    `;

    const metricRowHTML = (label, values) => `
      <div class="metricSub">${label}</div>
      ${values.map((v) => `<div class="metricVal">${esc(v)}</div>`).join("")}
    `;

    function metricHTML(p){
      return `
        <div class="metric">
          ${metricHeadHTML()}
          ${metricRowHTML("勝率", [
            safeNum(p.nat_win),
            safeNum(p.loc_win),
            safeNum(p.motor_no),
            safeNum(p.boat_no)
          ])}
          ${metricRowHTML("2連率", [
            safeNum(p.nat_2),
            safeNum(p.loc_2),
            safeNum(p.motor_2),
            safeNum(p.boat_2)
          ])}
          ${metricRowHTML("3連率", [
            safeNum(p.nat_3),
            safeNum(p.loc_3),
            safeNum(p.motor_3),
            safeNum(p.boat_3)
          ])}
        </div>
      `;
    }

    function rowHTML(p){
      const regno = p.regno || p.id || "—";
      const grade = p.grade || "—";
      const branch = p.branch || "—";
      const age = (p.age !== undefined && p.age !== null && p.age !== "") ? `${p.age}歳` : "—";

      return `
        <div class="row">
          <div class="waku w${Number(p.waku) || 0}">${Number(p.waku) || ""}</div>

          <div class="info">
            <div class="sub">${esc(regno)} / ${esc(grade)} / ${esc(branch)} / ${esc(age)}</div>
            <div class="name">${esc(p.name || "—")}</div>
          </div>

          ${metricHTML(p)}
        </div>
      `;
    }

    function renderRaceJSON(r, json){
      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = `締切: ${toHM(json?.race?.cutoff || json?.cutoff || "")}`;
      $dayLabel.textContent = String(json?.day_label || "").trim() || "—";

      const boatsRaw = Array.isArray(json?.race?.boats) ? json.race.boats : [];
      if (!boatsRaw.length){
        $table.innerHTML = `<div class="err">出走表が空です。<br>（race.boats が見つかりません）</div>`;
        return;
      }

      $table.innerHTML = normalizeBoatsTo6(boatsRaw).map(rowHTML).join("");
      requestAnimationFrame(setTopHeight);
    }

    function syncURLRace(r){
      const next = new URL(location.href);
      next.searchParams.set("race", String(r));
      history.replaceState(null, "", next.toString());
    }

    function buildCandidateUrls(r){
      return [
        ...(jcd && jcd !== "00" ? [`${BOT_RACES_BASE_URL}${encodeURIComponent(`${jcd}_${r}R.json`)}`] : []),
        `${BOT_RACES_BASE_URL}${encodeURIComponent(`${venueName}_${r}R.json`)}`
      ];
    }

    async function fetchRaceJSON(r){
      let lastErr = null;
      for (const url of buildCandidateUrls(r)){
        try { return await fetchJSON(url); }
        catch (e) { lastErr = e; }
      }
      throw lastErr || new Error("race json not found");
    }

    async function setRace(r){
      r = clamp(Number(r) || 1, 1, 12);
      makeTabs(r);
      syncURLRace(r);

      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = "締切: --:--";
      $dayLabel.textContent = "—";
      $table.innerHTML = `<div class="err">データを読み込み中…</div>`;

      if (!venueName || venueName === "会場"){
        $table.innerHTML = `<div class="err">name が指定されていません。<br>例：race.html?jcd=20&name=若松</div>`;
        return;
      }

      try {
        renderRaceJSON(r, await fetchRaceJSON(r));
      } catch (e) {
        $table.innerHTML = `<div class="err">JSONの取得に失敗しました。<br>${buildCandidateUrls(r).map(esc).join("<br>")}<br>（ファイル未生成 or URL違い）</div>`;
      }
    }

    async function boot(){
      const initialRace = clamp(Number(qs.get("race") || 1) || 1, 1, 12);
      makeTabs(initialRace);
      await setRace(initialRace);
      requestAnimationFrame(() => {
        setTopHeight();
        centerActiveTab();
      });
    }

    addEventListener("resize", setTopHeight, { passive:true });
    $("btnBack").addEventListener("click", () => history.back());
    requestAnimationFrame(setTopHeight);
    boot();
  </script>
</body>
</html>
