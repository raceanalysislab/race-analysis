<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>レース詳細</title>

  <!-- 既存CSS（残してOK） -->
  <link rel="stylesheet" href="./style.css" />

  <!-- 分割CSS（あるならON） -->
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/grid.css" />

  <style>
    /* race.html専用（最低限） */
    :root{
      --raceTopH: 132px;
      --bg:#0b1220;
      --panel:#111a2e;
      --card:#1f2937;
      --muted:#94a3b8;
      --accent:#f59e0b;
      --line:rgba(255,255,255,.08);
    }
    body{
      margin:0;
      background:var(--bg);
      color:#fff;
    }

    /* 上部固定 */
    .raceTop{
      position:sticky;
      top:0;
      z-index:50;
      background:linear-gradient(180deg, rgba(11,18,32,1) 0%, rgba(11,18,32,.96) 60%, rgba(11,18,32,.0) 100%);
      padding:12px 12px 10px;
      backdrop-filter:saturate(120%) blur(6px);
    }
    .raceHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 10px;
    }
    .raceHead__left{
      display:flex; flex-direction:column; gap:2px;
      min-width:0;
    }
    .raceVenue{
      font-weight:900;
      letter-spacing:.02em;
      font-size:16px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .raceMeta{
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:10px;
      align-items:center;
    }
    .raceBtn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    /* 1〜12R固定バー */
    .raceTabs{
      margin-top:10px;
      display:flex;
      gap:8px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:6px;
    }
    .raceTabs::-webkit-scrollbar{ display:none; }
    .tab{
      flex:0 0 auto;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:#fff;
      font-weight:900;
      font-size:13px;
    }
    .tab.is-active{
      background:var(--accent);
      color:#000;
      border-color:transparent;
    }

    /* 下だけスクロール */
    .raceBody{
      height:calc(100dvh - var(--raceTopH));
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:12px;
    }

    .section{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
    }
    .secTitle{
      margin:0 0 10px;
      font-size:13px;
      color:var(--muted);
      letter-spacing:.08em;
      font-weight:900;
    }

    /* 出走表（無料＝選手情報だけ） */
    .table{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .row{
      display:grid;
      grid-template-columns: 44px 1fr 88px;
      gap:10px;
      align-items:center;
      background:var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:10px 10px;
    }
    .waku{
      width:44px; height:44px;
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-weight:1000;
      color:#000;
      background:#fff;
    }
    .waku.w1{ background:#ffffff; }
    .waku.w2{ background:#111827; color:#fff; }
    .waku.w3{ background:#ef4444; color:#fff; }
    .waku.w4{ background:#2563eb; color:#fff; }
    .waku.w5{ background:#fbbf24; color:#000; }
    .waku.w6{ background:#22c55e; color:#000; }

    .info{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .name{
      font-weight:1000;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .sub{
      font-size:12px;
      color:rgba(255,255,255,.72);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .metric{
      text-align:right;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .st{
      font-weight:1000;
      font-size:13px;
    }
    .win{
      font-size:11px;
      color:rgba(255,255,255,.7);
    }

    .note{
      margin-top:10px;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.6;
    }

    .err{
      font-size:12px;
      color:rgba(255,255,255,.72);
      line-height:1.7;
      padding:10px 12px;
      border:1px dashed rgba(255,255,255,.18);
      border-radius:12px;
      background:rgba(255,255,255,.03);
    }

    /* iOS下部余白 */
    .safeBottom{
      height:calc(16px + env(safe-area-inset-bottom));
    }
  </style>
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>
        <div class="raceMeta">
          <span id="raceNoLabel">—R</span>
          <span id="timeLabel">締切: --:--</span>
        </div>
      </div>
      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody" id="raceBody">
    <section class="section">
      <h2 class="secTitle">出走表（無料：選手情報のみ）</h2>
      <div class="table" id="table"></div>
      <div class="note" id="note">
        ※無料版は「各選手データの確認」専用です。予想は表示しません。
      </div>
      <div class="safeBottom"></div>
    </section>
  </div>

  <script>
    // ======================
    // 受け取り
    // ======================
    const qs = new URLSearchParams(location.search);
    const jcd = qs.get("jcd") || "";               // "01".."24"
    const venueName = qs.get("name") || "会場";
    document.getElementById("venueName").textContent = decodeURIComponent(venueName);

    const $tabs = document.getElementById("tabs");
    const $table = document.getElementById("table");
    const $raceNoLabel = document.getElementById("raceNoLabel");
    const $timeLabel = document.getElementById("timeLabel");
    const $raceTop = document.getElementById("raceTop");

    function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

    function toHM(x){
      const s = String(x || "");
      const m = s.match(/(\d{1,2}):(\d{2})/);
      if (!m) return "--:--";
      const hh = String(m[1]).padStart(2,"0");
      return `${hh}:${m[2]}`;
    }

    function setTopHeight(){
      const h = $raceTop.getBoundingClientRect().height || 132;
      document.documentElement.style.setProperty("--raceTopH", `${Math.ceil(h)}px`);
    }
    addEventListener("resize", () => setTopHeight(), {passive:true});
    requestAnimationFrame(() => setTopHeight());

    function makeTabs(active){
      $tabs.innerHTML = "";
      for(let r=1; r<=12; r++){
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tab" + (r===active ? " is-active" : "");
        b.textContent = r + "R";
        b.addEventListener("click", () => setRace(r));
        $tabs.appendChild(b);
      }
    }

    function escapeHTML(s){
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    function pad2(n){ return String(n).padStart(2,"0"); }

    // ======================
    // JST日付（フォルダ名用：YYYYMMDD）
    // ======================
    function todayJST_YYYYMMDD(){
      const parts = new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric", month: "2-digit", day: "2-digit",
        hour12: false
      }).formatToParts(new Date());

      const get = (t) => parts.find(p => p.type === t)?.value;
      const y = get("year");
      const m = get("month");
      const d = get("day");
      return `${y}${m}${d}`;
    }

    // ======================
    // HTML取得（data/html/YYYYMMDD/{jcd}_r{r}.html）
    // ======================
    async function fetchText(path){
      const url = `${path}?t=${Date.now()}`;
      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`failed: ${path}`);
      return await res.text();
    }

    // ======================
    // mbrace HTML を DOM で解析
    // ======================
    function parseMbraceHTML(htmlText){
      const doc = new DOMParser().parseFromString(htmlText, "text/html");
      const text = doc.body ? (doc.body.innerText || "") : "";

      // 締切（例: 電話投票締切予定１５：２０）
      // 半角/全角どっちも拾う
      const mClose = text.match(/締切予定\s*([0-9]{1,2})[:：]([0-9]{2})/);
      const closeHM = mClose ? `${pad2(mClose[1])}:${mClose[2]}` : null;

      // 選手行：先頭が 1..6 の行を拾う（例: "1 5285若林 麗26東京53B1 3.74 ..."）
      const lines = text.split("\n").map(s => s.trim()).filter(Boolean);
      const rows = [];

      for (const ln of lines){
        // 1 5285若林　麗26東京53B1 3.74 ...
        // 名前にスペース/全角スペースが混じるので幅広く
        const m = ln.match(/^([1-6])\s+(\d{4})\s*([^\d\s]{1,6}\s*[^\d\s]{0,6})\s*([0-9]{1,2})\s*([^\d\s]{2,6})\s*([0-9]{2})\s*(A1|A2|B1|B2)\s+([0-9]+\.[0-9]{2})/);
        if (!m) continue;

        const w = Number(m[1]);
        const regno = m[2];
        const name = String(m[3] || "").replace(/\s+/g,"");
        const age = m[4];
        const branch = m[5];
        const weight = m[6];
        const grade = m[7];
        const natWin = m[8]; // ここでは参考表示に使える

        rows.push({
          w,
          id: regno,
          name,
          branch,
          st: "--",                 // mbrace HTMLのこの部分だけでは平均STが無いことが多いので "--"
          rate: `勝率 ${natWin}`,    // 右端の表示に流用（無料版は情報だけ）
        });
      }

      return { closeHM, rows };
    }

    function rowHTML(p){
      const idText = p.id ? `登録 ${p.id}` : "";
      const branchText = p.branch ? p.branch : "";
      const rateText = p.rate ? p.rate : "";

      return `
        <div class="row">
          <div class="waku w${p.w}">${p.w}</div>
          <div class="info">
            <div class="name">${escapeHTML(p.name)}</div>
            <div class="sub">
              ${idText ? `<span>${escapeHTML(idText)}</span>` : ``}
              ${branchText ? `<span>${escapeHTML(branchText)}</span>` : ``}
            </div>
          </div>
          <div class="metric">
            <div class="st">ST ${escapeHTML(p.st)}</div>
            <div class="win">${escapeHTML(rateText)}</div>
          </div>
        </div>
      `;
    }

    function syncURLRace(r){
      const next = new URL(location.href);
      next.searchParams.set("race", String(r));
      history.replaceState(null, "", next.toString());
    }

    async function setRace(r){
      r = clamp(Number(r)||1, 1, 12);
      makeTabs(r);
      syncURLRace(r);

      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = "締切: --:--";
      $table.innerHTML = `<div class="err">データを読み込み中…</div>`;

      if (!jcd){
        $table.innerHTML = `<div class="err">jcd が指定されていません。<br>例：race.html?jcd=04&name=平和島</div>`;
        return;
      }

      const ymd = todayJST_YYYYMMDD();
      const path = `./data/html/${ymd}/${jcd}_r${r}.html`;

      try{
        const htmlText = await fetchText(path);
        const parsed = parseMbraceHTML(htmlText);

        if (parsed.closeHM) $timeLabel.textContent = "締切: " + toHM(parsed.closeHM);

        if (!parsed.rows.length){
          $table.innerHTML = `<div class="err">出走表が読み取れませんでした。<br>${escapeHTML(path)}<br>（HTML形式が想定と違う可能性）</div>`;
          return;
        }

        $table.innerHTML = parsed.rows.map(rowHTML).join("");
        requestAnimationFrame(() => setTopHeight());
      }catch(e){
        $table.innerHTML = `<div class="err">HTMLの取得に失敗しました。<br>${escapeHTML(path)}<br>（ファイルが未生成 or パス違い）</div>`;
      }
    }

    async function boot(){
      const initialRace = clamp(Number(qs.get("race") || 1) || 1, 1, 12);
      makeTabs(initialRace);
      await setRace(initialRace);
      requestAnimationFrame(() => setTopHeight());
    }

    document.getElementById("btnBack").addEventListener("click", () => history.back());
    boot();
  </script>
</body>
</html>
