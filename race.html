<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7fb">
  <title>レース詳細</title>
  <link rel="stylesheet" href="./css/race-detail.css">
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>

        <div class="raceMeta">
          <span class="metaChip" id="raceNoLabel">—R</span>
          <span class="metaChip" id="timeLabel">締切: --:--</span>
          <span class="metaChip" id="dayLabel">—</span>
        </div>
      </div>

      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody">
    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle">レース情報</div>
      </div>

      <div class="viewTabs" id="viewTabs">
        <button type="button" class="viewTab is-active" data-view="0">出走表</button>
        <button type="button" class="viewTab" data-view="1">コースデータ</button>
        <button type="button" class="viewTab" data-view="2">枠傾向</button>
      </div>

      <div class="viewPager" id="viewPager">
        <div class="viewTrack" id="viewTrack">
          <!-- 出走表 -->
          <div class="viewPage">
            <div class="entryBoard">
              <div class="entryHead">
                <div class="entryHead__waku">枠</div>
                <div class="entryHead__name">選手名</div>
                <div class="entryHead__st">平均ST</div>
                <div class="entryHead__nat">全国</div>
                <div class="entryHead__motor">モーター</div>
              </div>
              <div class="entryTable" id="entryTable"></div>
            </div>
          </div>

          <!-- コースデータ -->
          <div class="viewPage">
            <div class="courseWrap" id="courseDataPanel">
              <div class="courseInnerTabs" id="courseInnerTabs">
                <button type="button" class="courseInnerTab is-active" data-course-tab="year">
                  コース別直近1年
                </button>
                <button type="button" class="courseInnerTab" data-course-tab="local">
                  コース別当地直近5年
                </button>
              </div>

              <div id="courseYearView">
                <div class="courseBlock">
                  <div class="courseBlockTitle">コース別直近1年</div>
                  <div class="courseBlockSub">枠番を縦、比較データを横並びで表示します。</div>

                  <div class="courseScroll">
                    <div class="courseTable">
                      <div class="courseHeadRow">
                        <div class="courseHeadCell courseHeadCell--waku">枠</div>
                        <div class="courseHeadCell">平均ST</div>
                        <div class="courseHeadCell">今節平均ST</div>
                        <div class="courseHeadCell">コース勝率</div>
                        <div class="courseHeadCell">差/捲/捲差</div>
                        <div class="courseHeadCell">2着内率</div>
                        <div class="courseHeadCell">3着内率</div>
                      </div>
                      <div class="courseBody" id="courseYearBody"></div>
                    </div>
                  </div>
                </div>
              </div>

              <div id="courseLocalView" style="display:none;">
                <div class="courseBlock">
                  <div class="courseBlockTitle">コース別当地直近5年</div>
                  <div class="courseBlockSub">当地実績を同じ並びで表示します。</div>

                  <div class="courseScroll">
                    <div class="courseTable">
                      <div class="courseHeadRow">
                        <div class="courseHeadCell courseHeadCell--waku">枠</div>
                        <div class="courseHeadCell">平均ST</div>
                        <div class="courseHeadCell">今節平均ST</div>
                        <div class="courseHeadCell">コース勝率</div>
                        <div class="courseHeadCell">差/捲/捲差</div>
                        <div class="courseHeadCell">2着内率</div>
                        <div class="courseHeadCell">3着内率</div>
                      </div>
                      <div class="courseBody" id="courseLocalBody"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 枠傾向 -->
          <div class="viewPage">
            <div class="panelPlaceholder">
              <div class="panelPlaceholder__title">枠傾向</div>
              <div class="panelPlaceholder__text">
                ここには会場別の1枠逃げ率、2枠差し率などを表示予定です
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="./js/race-detail.js"></script>
</body>
</html>
