<!doctype html>
<html lang="ja">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f7fb">

<title>レース詳細</title>

<link rel="stylesheet" href="./css/race-detail.css">

</head>

<body>

<div class="raceTop" id="raceTop">

<div class="raceHead">

<div class="raceHead__left">
<div id="venueName" class="raceVenue">—</div>

<div class="raceMeta">
<span class="metaChip" id="raceNoLabel">—R</span>
<span class="metaChip" id="timeLabel">締切: --:--</span>
<span class="metaChip" id="dayLabel">—</span>
</div>
</div>

<button class="raceBtn" id="btnBack">戻る</button>

</div>

<div class="raceTabs" id="tabs"></div>

</div>

<div class="raceBody">

<section class="section">

<div class="sectionHead">

<div class="sectionTitle">
レース情報
</div>

<div class="sectionMeta">
無料版は<br>
選手データ確認のみ
</div>

</div>

<div class="viewTabs" id="viewTabs">

<button class="viewTab is-active" data-view="0">
出走表
</button>

<button class="viewTab" data-view="1">
コースデータ
</button>

<button class="viewTab" data-view="2">
過去枠番成績
</button>

</div>


<div class="viewPager" id="viewPager">

<div class="viewTrack" id="viewTrack">

<div class="viewPage">

<div class="table" id="table"></div>

</div>


<div class="viewPage">

<div class="panelPlaceholder">

<div class="panelPlaceholder__title">
コースデータ
</div>

<div class="panelPlaceholder__text">
ここにはコース別データを表示予定です
</div>

</div>

</div>


<div class="viewPage">

<div class="panelPlaceholder">

<div class="panelPlaceholder__title">
過去枠番成績
</div>

<div class="panelPlaceholder__text">
ここには枠番データを表示予定です
</div>

</div>

</div>

</div>

</div>


<div class="note">
※無料版は選手データのみ
</div>

</section>

</div>


<script src="./js/race-detail.js"></script>

</body>
</html>
