<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>レース詳細</title>

  <!-- 既存CSS（残してOK） -->
  <link rel="stylesheet" href="./style.css" />

  <!-- 分割CSS（あるならON） -->
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/grid.css" />

  <style>
    /* race.html専用（最低限） */
    :root{
      --raceTopH: 132px;
      --bg:#0b1220;
      --panel:#111a2e;
      --card:#1f2937;
      --muted:#94a3b8;
      --accent:#f59e0b;
      --line:rgba(255,255,255,.08);
    }
    body{
      margin:0;
      background:var(--bg);
      color:#fff;
    }

    /* 上部固定 */
    .raceTop{
      position:sticky;
      top:0;
      z-index:50;
      background:linear-gradient(180deg, rgba(11,18,32,1) 0%, rgba(11,18,32,.96) 60%, rgba(11,18,32,.0) 100%);
      padding:12px 12px 10px;
      backdrop-filter:saturate(120%) blur(6px);
    }
    .raceHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 10px;
    }
    .raceHead__left{
      display:flex; flex-direction:column; gap:2px;
      min-width:0;
    }
    .raceVenue{
      font-weight:900;
      letter-spacing:.02em;
      font-size:16px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .raceMeta{
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:10px;
      align-items:center;
    }
    .raceBtn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    /* 1〜12R固定バー */
    .raceTabs{
      margin-top:10px;
      display:flex;
      gap:8px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:6px;
    }
    .raceTabs::-webkit-scrollbar{ display:none; }
    .tab{
      flex:0 0 auto;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:#fff;
      font-weight:900;
      font-size:13px;
    }
    .tab.is-active{
      background:var(--accent);
      color:#000;
      border-color:transparent;
    }

    /* 下だけスクロール */
    .raceBody{
      height:calc(100dvh - var(--raceTopH));
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:12px;
    }

    .section{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
    }
    .secTitle{
      margin:0 0 10px;
      font-size:13px;
      color:var(--muted);
      letter-spacing:.08em;
      font-weight:900;
    }

    /* 出走表（無料＝選手情報だけ） */
    .table{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .row{
      display:grid;
      grid-template-columns: 44px 1fr 88px;
      gap:10px;
      align-items:center;
      background:var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:10px 10px;
    }
    .waku{
      width:44px; height:44px;
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-weight:1000;
      color:#000;
      background:#fff;
    }
    .waku.w1{ background:#ffffff; }
    .waku.w2{ background:#111827; color:#fff; }
    .waku.w3{ background:#ef4444; color:#fff; }
    .waku.w4{ background:#2563eb; color:#fff; }
    .waku.w5{ background:#fbbf24; color:#000; }
    .waku.w6{ background:#22c55e; color:#000; }

    .info{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .name{
      font-weight:1000;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .sub{
      font-size:12px;
      color:rgba(255,255,255,.72);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .metric{
      text-align:right;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .st{
      font-weight:1000;
      font-size:13px;
    }
    .win{
      font-size:11px;
      color:rgba(255,255,255,.7);
    }

    .note{
      margin-top:10px;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.6;
    }

    .err{
      font-size:12px;
      color:rgba(255,255,255,.72);
      line-height:1.7;
      padding:10px 12px;
      border:1px dashed rgba(255,255,255,.18);
      border-radius:12px;
      background:rgba(255,255,255,.03);
    }

    /* iOS下部余白 */
    .safeBottom{
      height:calc(16px + env(safe-area-inset-bottom));
    }
  </style>
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>
        <div class="raceMeta">
          <span id="raceNoLabel">—R</span>
          <span id="timeLabel">締切: --:--</span>
        </div>
      </div>
      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody" id="raceBody">
    <section class="section">
      <h2 class="secTitle">出走表（無料：選手情報のみ）</h2>
      <div class="table" id="table"></div>
      <div class="note" id="note">
        ※無料版は「各選手データの確認」専用です。予想は表示しません。
      </div>
      <div class="safeBottom"></div>
    </section>
  </div>

  <script>
    // ===== 受け取る =====
    const qs = new URLSearchParams(location.search);
    const jcd = qs.get("jcd") || "";
    const venueName = qs.get("name") || "会場";
    document.getElementById("venueName").textContent = decodeURIComponent(venueName);

    // ===== UI =====
    const $tabs = document.getElementById("tabs");
    const $table = document.getElementById("table");
    const $raceNoLabel = document.getElementById("raceNoLabel");
    const $timeLabel = document.getElementById("timeLabel");
    const $raceTop = document.getElementById("raceTop");

    function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

    function toHM(x){
      const s = String(x || "");
      // "HH:MM" / "YYYY-MM-DD HH:MM" みたいなのも許容
      const m = s.match(/(\d{1,2}):(\d{2})/);
      if (!m) return "--:--";
      const hh = String(m[1]).padStart(2,"0");
      return `${hh}:${m[2]}`;
    }

    function setTopHeight(){
      const h = $raceTop.getBoundingClientRect().height || 132;
      document.documentElement.style.setProperty("--raceTopH", `${Math.ceil(h)}px`);
    }
    addEventListener("resize", () => setTopHeight(), {passive:true});
    requestAnimationFrame(() => setTopHeight());

    function makeTabs(active){
      $tabs.innerHTML = "";
      for(let r=1; r<=12; r++){
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tab" + (r===active ? " is-active" : "");
        b.textContent = r + "R";
        b.addEventListener("click", () => setRace(r));
        $tabs.appendChild(b);
      }
    }

    // ===== today.json 読み込み =====
    let TODAY = null;
    let VENUE = null;

    async function fetchJSON(path){
      const url = `${path}?t=${Date.now()}`;
      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`failed: ${path}`);
      return await res.json();
    }

    function pickFirst(obj, keys){
      for (const k of keys){
        if (obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== "") return obj[k];
      }
      return null;
    }

    function findVenueData(today, jcd){
      if (!today || !jcd) return null;

      // 1) { "01": {...}, "02": {...} } 形式
      if (typeof today === "object" && !Array.isArray(today) && today[jcd]){
        return today[jcd];
      }

      // 2) { venues: [...] } / { data: [...] } 形式
      const arr = today.venues || today.data || today.items || null;
      if (Array.isArray(arr)){
        return arr.find(v => String(v.jcd || v.venue_id || v.id || "") === String(jcd)) || null;
      }

      // 3) その他：全部舐める
      if (typeof today === "object" && !Array.isArray(today)){
        for (const k of Object.keys(today)){
          const v = today[k];
          if (v && String(v.jcd || "") === String(jcd)) return v;
        }
      }
      return null;
    }

    function getRaceObj(venue, r){
      if (!venue) return null;

      // よくある：venue.races が配列 or オブジェクト
      const races = venue.races || venue.race || venue.race_list || venue.racelist || null;

      if (Array.isArray(races)){
        // raceNo / r / no / race みたいなキーで探す
        return races.find(x => Number(pickFirst(x, ["raceNo","race_no","r","no","race"])) === Number(r)) || races[r-1] || null;
      }

      if (races && typeof races === "object"){
        return races[String(r)] || races[`r${r}`] || races[r] || null;
      }

      // venue直下に "1": {...} みたいな形
      if (venue[String(r)]) return venue[String(r)];

      return null;
    }

    function normalizeEntries(raceObj){
      if (!raceObj) return [];

      const entries =
        raceObj.entries ||
        raceObj.entry ||
        raceObj.members ||
        raceObj.players ||
        raceObj.rows ||
        raceObj.racers ||
        raceObj.list ||
        (Array.isArray(raceObj) ? raceObj : null);

      if (Array.isArray(entries)) return entries;

      // entriesがオブジェクトで 1..6 キー持ってる場合
      if (entries && typeof entries === "object"){
        const vals = Object.values(entries);
        if (vals.every(v => typeof v === "object")) return vals;
      }
      return [];
    }

    function mapRow(raw, idx){
      const w =
        Number(pickFirst(raw, ["waku","w","lane","course","teiban","枠","艇番"])) ||
        (idx + 1);

      const name =
        String(pickFirst(raw, ["name","racer_name","player","nm","選手名"])) ||
        `選手${w}`;

      const id =
        String(pickFirst(raw, ["id","regno","toban","number","登録番号"])) || "";

      const branch =
        String(pickFirst(raw, ["branch","pref","shusshin","出身","支部"])) || "";

      const st =
        String(pickFirst(raw, ["st","avg_st","avgST","start","平均ST"])) || "--";

      const rate =
        String(pickFirst(raw, ["rate","win","nation","national","zennkoku","全国"])) || "";

      return { w, name, id, branch, st, rate };
    }

    function rowHTML(p){
      const idText = p.id ? `登録 ${p.id}` : "";
      const branchText = p.branch ? p.branch : "";
      const rateText = p.rate ? p.rate : "";

      return `
        <div class="row">
          <div class="waku w${p.w}">${p.w}</div>
          <div class="info">
            <div class="name">${escapeHTML(p.name)}</div>
            <div class="sub">
              ${idText ? `<span>${escapeHTML(idText)}</span>` : ``}
              ${branchText ? `<span>${escapeHTML(branchText)}</span>` : ``}
            </div>
          </div>
          <div class="metric">
            <div class="st">ST ${escapeHTML(p.st)}</div>
            <div class="win">${escapeHTML(rateText)}</div>
          </div>
        </div>
      `;
    }

    function escapeHTML(s){
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    function renderRace(r, raceObj){
      $raceNoLabel.textContent = `${r}R`;

      const close =
        pickFirst(raceObj, ["close_at","closeAt","close","time","deadline","締切","close_time"]);
      $timeLabel.textContent = "締切: " + toHM(close);

      const entries = normalizeEntries(raceObj).map(mapRow);
      if (!entries.length){
        $table.innerHTML = `<div class="err">このレースの出走表データが見つかりませんでした。<br>（today.json の形式が想定と違う可能性あり）</div>`;
        return;
      }
      $table.innerHTML = entries.map(rowHTML).join("");
    }

    function syncURLRace(r){
      const next = new URL(location.href);
      next.searchParams.set("race", String(r));
      history.replaceState(null, "", next.toString());
    }

    function setRace(r){
      r = clamp(Number(r)||1, 1, 12);
      makeTabs(r);
      syncURLRace(r);

      if (!TODAY || !VENUE){
        $table.innerHTML = `<div class="err">データ読込中…</div>`;
        return;
      }

      const raceObj = getRaceObj(VENUE, r);
      if (!raceObj){
        $table.innerHTML = `<div class="err">${r}R のデータが見つかりませんでした。</div>`;
        $raceNoLabel.textContent = `${r}R`;
        $timeLabel.textContent = "締切: --:--";
        return;
      }

      renderRace(r, raceObj);
    }

    async function boot(){
      // 初期タブだけ先に出す
      const initialRace = clamp(Number(qs.get("race") || 1) || 1, 1, 12);
      makeTabs(initialRace);
      $table.innerHTML = `<div class="err">データを読み込み中…</div>`;

      try{
        TODAY = await fetchJSON("./data/today.json");
      }catch(e){
        $table.innerHTML = `<div class="err">today.json の取得に失敗しました。<br>./data/today.json が存在するか確認して下さい。</div>`;
        return;
      }

      VENUE = findVenueData(TODAY, jcd);
      if (!VENUE){
        $table.innerHTML = `<div class="err">会場データが見つかりませんでした。<br>jcd=${escapeHTML(jcd)} が today.json にあるか確認して下さい。</div>`;
        return;
      }

      // ここで初回描画
      setRace(initialRace);
      requestAnimationFrame(() => setTopHeight());
    }

    // 戻る
    document.getElementById("btnBack").addEventListener("click", () => history.back());

    boot();
  </script>
</body>
</html>
