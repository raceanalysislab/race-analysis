<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7fb" />
  <title>レース詳細</title>

  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --raceTopH: 118px;

      --bg:#f3f5f9;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --line:#e2e8f0;
      --line-soft:#eef2f7;

      --text:#0f172a;
      --muted:#64748b;
      --muted-2:#94a3b8;
      --accent:#2563eb;
      --accent-soft:#dbeafe;

      --shadow:
        0 8px 24px rgba(15,23,42,.06),
        0 1px 0 rgba(255,255,255,.9) inset;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background:linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
      overscroll-behavior-y:none;
    }

    body{
      padding-top:var(--safe-top);
    }

    .raceTop{
      position:sticky;
      top:0;
      z-index:50;
      padding:10px 12px 8px;
      background:rgba(246,247,251,.94);
      backdrop-filter:blur(12px) saturate(120%);
      border-bottom:1px solid rgba(226,232,240,.9);
    }

    .raceHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
    }

    .raceHead__left{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .raceVenue{
      font-size:24px;
      line-height:1.02;
      font-weight:1000;
      letter-spacing:.01em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#0f172a;
    }

    .raceMeta{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      font-size:11px;
      line-height:1;
      color:var(--muted);
    }

    .metaChip{
      display:inline-flex;
      align-items:center;
      min-height:26px;
      padding:0 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel-soft);
      white-space:nowrap;
      font-weight:700;
    }

    .raceBtn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel-soft);
      color:var(--text);
      min-width:68px;
      height:40px;
      border-radius:12px;
      padding:0 12px;
      font-size:13px;
      font-weight:900;
      flex:0 0 auto;
    }

    .raceTabs{
      margin-top:10px;
      display:flex;
      gap:7px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      padding-bottom:2px;
      scroll-behavior:smooth;
    }

    .raceTabs::-webkit-scrollbar{ display:none; }

    .tab{
      flex:0 0 auto;
      appearance:none;
      min-width:54px;
      height:36px;
      padding:0 11px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      font-size:13px;
      font-weight:900;
      line-height:1;
    }

    .tab.is-active{
      background:linear-gradient(180deg, #2f7cff 0%, #2563eb 100%);
      color:#fff;
      border-color:transparent;
      box-shadow:0 8px 18px rgba(37,99,235,.18);
    }

    .raceBody{
      height:calc(100dvh - var(--raceTopH));
      overflow:hidden;
      padding:8px 12px calc(10px + var(--safe-bottom));
    }

    .section{
      height:100%;
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:10px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .sectionHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      padding-bottom:8px;
      border-bottom:1px solid var(--line-soft);
      flex:0 0 auto;
    }

    .sectionTitle{
      font-size:13px;
      font-weight:1000;
      letter-spacing:.03em;
      color:#0f172a;
    }

    .sectionMeta{
      font-size:10px;
      line-height:1.35;
      color:var(--muted-2);
      text-align:right;
      white-space:nowrap;
    }

    .table{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:7px;
      justify-content:space-between;
    }

    .row{
      flex:1 1 0;
      min-height:0;
      display:grid;
      grid-template-columns: 40px 1fr 112px;
      gap:8px;
      align-items:center;
      border-radius:16px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border:1px solid #e5eaf2;
      padding:8px;
    }

    .waku{
      width:40px;
      height:40px;
      border-radius:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:1000;
      letter-spacing:-.03em;
      border:1px solid rgba(15,23,42,.08);
    }

    .waku.w1{ background:#ffffff; color:#111827; }
    .waku.w2{ background:#1f2937; color:#ffffff; }
    .waku.w3{ background:#ef4444; color:#ffffff; }
    .waku.w4{ background:#2563eb; color:#ffffff; }
    .waku.w5{ background:#facc15; color:#111827; }
    .waku.w6{ background:#22c55e; color:#111827; }

    .info{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:3px;
    }

    .name{
      font-size:15px;
      line-height:1.08;
      font-weight:1000;
      color:#0f172a;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:.01em;
    }

    .sub{
      display:flex;
      gap:6px 8px;
      flex-wrap:wrap;
      font-size:11px;
      line-height:1.15;
      color:#64748b;
    }

    .metric{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-end;
      gap:3px;
      text-align:right;
    }

    .st{
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:11px;
      line-height:1.15;
      font-weight:900;
      color:#0f172a;
    }

    .win{
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:10px;
      line-height:1.15;
      color:#64748b;
    }

    .rate-high{ color:#16a34a; }
    .rate-mid{ color:#d97706; }
    .rate-low{ color:#64748b; }

    .muted{ color:#64748b; }

    .note{
      margin-top:8px;
      padding:0 2px;
      color:var(--muted);
      font-size:11px;
      line-height:1.45;
      flex:0 0 auto;
    }

    .err{
      padding:12px 14px;
      border-radius:14px;
      border:1px dashed #cbd5e1;
      background:#f8fafc;
      color:#475569;
      font-size:12px;
      line-height:1.7;
      word-break:break-word;
    }

    @media (max-width: 390px){
      :root{ --raceTopH: 112px; }

      .raceTop{ padding:8px 10px 7px; }
      .raceHead{ padding:10px; }
      .raceVenue{ font-size:22px; }

      .raceBody{
        padding-left:10px;
        padding-right:10px;
      }

      .section{ padding:9px; }

      .row{
        grid-template-columns: 36px 1fr 102px;
        gap:7px;
        padding:7px;
        border-radius:15px;
      }

      .waku{
        width:36px;
        height:36px;
        font-size:20px;
        border-radius:11px;
      }

      .name{ font-size:14px; }
      .sub{ font-size:10px; }
      .st{ font-size:10px; }
      .win{ font-size:9px; }
    }

    @media (max-height: 760px){
      :root{ --raceTopH: 108px; }

      .raceTop{ padding:7px 10px 6px; }
      .raceHead{ padding:10px; }
      .raceTabs{ margin-top:8px; }
      .raceBody{ padding-top:6px; }

      .section{ padding:8px; }
      .sectionHead{
        margin-bottom:6px;
        padding-bottom:6px;
      }

      .table{ gap:6px; }

      .row{
        padding:6px 7px;
        grid-template-columns: 34px 1fr 98px;
      }

      .waku{
        width:34px;
        height:34px;
        font-size:18px;
        border-radius:10px;
      }

      .name{ font-size:13px; }
      .sub{ font-size:10px; gap:5px 7px; }
      .st{ font-size:10px; }
      .win{ font-size:9px; }
      .note{ font-size:10px; margin-top:6px; }
    }
  </style>
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>
        <div class="raceMeta">
          <span class="metaChip" id="raceNoLabel">—R</span>
          <span class="metaChip" id="timeLabel">締切: --:--</span>
          <span class="metaChip" id="dayLabel">—</span>
        </div>
      </div>
      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody" id="raceBody">
    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle">出走表</div>
        <div class="sectionMeta">無料版は<br>選手データ確認のみ</div>
      </div>

      <div class="table" id="table"></div>

      <div class="note" id="note">
        ※無料版は「各選手データの確認」専用です。予想は表示しません。
      </div>
    </section>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const venueNameRaw = qs.get("name") || "会場";
    const venueName = decodeURIComponent(venueNameRaw);
    const jcd = String(qs.get("jcd") || "").padStart(2, "0");

    document.getElementById("venueName").textContent = venueName;

    const $tabs = document.getElementById("tabs");
    const $table = document.getElementById("table");
    const $raceNoLabel = document.getElementById("raceNoLabel");
    const $timeLabel = document.getElementById("timeLabel");
    const $dayLabel = document.getElementById("dayLabel");
    const $raceTop = document.getElementById("raceTop");

    const BOT_RACES_BASE_URL =
      "https://cdn.jsdelivr.net/gh/raceanalysislab/race-data-bot@main/data/site/races/";

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    function toHM(x){
      const s = String(x || "");
      const m = s.match(/(\d{1,2}):(\d{2})/);
      if (!m) return "--:--";
      const hh = String(m[1]).padStart(2, "0");
      return `${hh}:${m[2]}`;
    }

    function setTopHeight(){
      const h = $raceTop.getBoundingClientRect().height || 118;
      document.documentElement.style.setProperty("--raceTopH", `${Math.ceil(h)}px`);
    }

    addEventListener("resize", () => setTopHeight(), { passive:true });
    requestAnimationFrame(() => setTopHeight());

    function centerActiveTab(){
      const active = $tabs.querySelector(".tab.is-active");
      if (!active) return;

      const offset = active.offsetLeft - ($tabs.clientWidth / 2) + (active.clientWidth / 2);
      $tabs.scrollTo({
        left: Math.max(0, offset),
        behavior: "smooth"
      });
    }

    function makeTabs(active){
      $tabs.innerHTML = "";
      for(let r = 1; r <= 12; r++){
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tab" + (r === active ? " is-active" : "");
        b.textContent = r + "R";
        b.addEventListener("click", () => setRace(r));
        $tabs.appendChild(b);
      }
      requestAnimationFrame(centerActiveTab);
    }

    function escapeHTML(s){
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[c]));
    }

    async function fetchJSON(url){
      const bust = url.includes("?") ? `&t=${Date.now()}` : `?t=${Date.now()}`;
      const res = await fetch(url + bust, { cache:"no-store" });
      if (!res.ok) throw new Error(`failed: ${url}`);
      return await res.json();
    }

    function normalizeBoatsTo6(boats){
      const byWaku = new Map();

      for (const b of boats){
        const w = Number(b?.waku);
        if (w >= 1 && w <= 6 && !byWaku.has(w)){
          byWaku.set(w, b);
        }
      }

      const rest = boats.filter((b) => {
        const w = Number(b?.waku);
        return !(w >= 1 && w <= 6 && byWaku.get(w) === b);
      });

      for (let w = 1; w <= 6; w++){
        if (!byWaku.has(w) && rest.length){
          const b = rest.shift();
          byWaku.set(w, { ...b, waku: w });
        }
      }

      const out = [];
      for (let w = 1; w <= 6; w++){
        out.push(
          byWaku.get(w) || {
            waku:w,
            name:"—",
            regno:"",
            branch:"",
            age:"",
            grade:"",
            nat_win:null,
            nat_2:null,
            motor_no:"",
            motor_2:"",
            boat_no:"",
            boat_2:""
          }
        );
      }
      return out;
    }

    function rateClass(value){
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (n >= 6.0) return "rate-high";
      if (n >= 5.0) return "rate-mid";
      return "rate-low";
    }

    function percentClass(value){
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (n >= 45) return "rate-high";
      if (n >= 30) return "rate-mid";
      return "rate-low";
    }

    function rowHTML(p){
      const w = Number(p.waku ?? 0) || 0;

      const idText = (p.regno || p.id) ? `登録 ${p.regno || p.id}` : "";
      const branchText = p.branch ? String(p.branch) : "";
      const ageText = (p.age !== undefined && p.age !== null && p.age !== "") ? `年齢 ${p.age}` : "";
      const gradeText = p.grade ? String(p.grade) : "";

      const natWinVal = (p.nat_win !== undefined && p.nat_win !== null && p.nat_win !== "")
        ? Number(p.nat_win).toFixed(2)
        : "";
      const nat2Val = (p.nat_2 !== undefined && p.nat_2 !== null && p.nat_2 !== "")
        ? Number(p.nat_2).toFixed(2)
        : "";

      const motor = (p.motor_no !== undefined && p.motor_no !== null && p.motor_no !== "")
        ? `M${p.motor_no} (${p.motor_2 ?? ""}%)`
        : "";
      const boat = (p.boat_no !== undefined && p.boat_no !== null && p.boat_no !== "")
        ? `B${p.boat_no} (${p.boat_2 ?? ""}%)`
        : "";

      const winHTML = natWinVal
        ? `<span class="${rateClass(natWinVal)}">勝率 ${escapeHTML(natWinVal)}</span>`
        : "";

      const nat2HTML = nat2Val
        ? `<span class="${percentClass(nat2Val)}">2連 ${escapeHTML(nat2Val)}%</span>`
        : "";

      const rightTop = (winHTML || nat2HTML)
        ? [winHTML, nat2HTML].filter(Boolean).join(" / ")
        : "—";

      const rightBtm = [motor, boat].filter(Boolean).join(" / ");

      return `
        <div class="row">
          <div class="waku w${w}">${w || ""}</div>

          <div class="info">
            <div class="name">${escapeHTML(p.name || "—")}</div>
            <div class="sub">
              ${gradeText ? `<span>${escapeHTML(gradeText)}</span>` : ``}
              ${branchText ? `<span>${escapeHTML(branchText)}</span>` : ``}
              ${idText ? `<span class="muted">${escapeHTML(idText)}</span>` : ``}
              ${ageText ? `<span class="muted">${escapeHTML(ageText)}</span>` : ``}
            </div>
          </div>

          <div class="metric">
            <div class="st">${rightTop}</div>
            <div class="win">${escapeHTML(rightBtm || "")}</div>
          </div>
        </div>
      `;
    }

    function renderRaceJSON(r, json){
      $raceNoLabel.textContent = `${r}R`;

      const close = json?.race?.cutoff || json?.cutoff || "";
      $timeLabel.textContent = "締切: " + toHM(close);

      const dayLabel = String(json?.day_label || "").trim();
      $dayLabel.textContent = dayLabel || "—";

      const boatsRaw = Array.isArray(json?.race?.boats) ? json.race.boats : [];
      if (!boatsRaw.length){
        $table.innerHTML = `<div class="err">出走表が空です。<br>（race.boats が見つかりません）</div>`;
        return;
      }

      const boats6 = normalizeBoatsTo6(boatsRaw);
      $table.innerHTML = boats6.map(rowHTML).join("");
      requestAnimationFrame(() => setTopHeight());
    }

    function syncURLRace(r){
      const next = new URL(location.href);
      next.searchParams.set("race", String(r));
      history.replaceState(null, "", next.toString());
    }

    function buildCandidateUrls(r){
      const urls = [];

      if (jcd && jcd !== "00"){
        urls.push(`${BOT_RACES_BASE_URL}${encodeURIComponent(`${jcd}_${r}R.json`)}`);
      }

      urls.push(`${BOT_RACES_BASE_URL}${encodeURIComponent(`${venueName}_${r}R.json`)}`);
      return urls;
    }

    async function fetchRaceJSON(r){
      const urls = buildCandidateUrls(r);
      let lastErr = null;

      for (const url of urls){
        try{
          return await fetchJSON(url);
        }catch(e){
          lastErr = e;
        }
      }

      throw lastErr || new Error("race json not found");
    }

    async function setRace(r){
      r = clamp(Number(r) || 1, 1, 12);
      makeTabs(r);
      syncURLRace(r);

      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = "締切: --:--";
      $dayLabel.textContent = "—";
      $table.innerHTML = `<div class="err">データを読み込み中…</div>`;

      if (!venueName || venueName === "会場"){
        $table.innerHTML = `<div class="err">name が指定されていません。<br>例：race.html?jcd=20&name=若松</div>`;
        return;
      }

      try{
        const json = await fetchRaceJSON(r);
        renderRaceJSON(r, json);
      }catch(e){
        const urls = buildCandidateUrls(r).map(escapeHTML).join("<br>");
        $table.innerHTML = `<div class="err">JSONの取得に失敗しました。<br>${urls}<br>（ファイル未生成 or URL違い）</div>`;
      }
    }

    async function boot(){
      const initialRace = clamp(Number(qs.get("race") || 1) || 1, 1, 12);
      makeTabs(initialRace);
      await setRace(initialRace);
      requestAnimationFrame(() => {
        setTopHeight();
        centerActiveTab();
      });
    }

    document.getElementById("btnBack").addEventListener("click", () => history.back());
    boot();
  </script>
</body>
</html>
