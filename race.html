<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>レース詳細</title>

  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/grid.css" />

  <style>
    :root{
      --raceTopH: 132px;
      --bg:#0b1220;
      --panel:#111a2e;
      --card:#1f2937;
      --muted:#94a3b8;
      --accent:#f59e0b;
      --line:rgba(255,255,255,.08);
    }
    body{ margin:0; background:var(--bg); color:#fff; }

    .raceTop{
      position:sticky; top:0; z-index:50;
      background:linear-gradient(180deg, rgba(11,18,32,1) 0%, rgba(11,18,32,.96) 60%, rgba(11,18,32,.0) 100%);
      padding:12px 12px 10px;
      backdrop-filter:saturate(120%) blur(6px);
    }
    .raceHead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 10px;
    }
    .raceHead__left{ display:flex; flex-direction:column; gap:2px; min-width:0; }
    .raceVenue{
      font-weight:900; letter-spacing:.02em; font-size:16px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .raceMeta{ font-size:12px; color:var(--muted); display:flex; gap:10px; align-items:center; }
    .raceBtn{
      appearance:none; border:none; border-radius:12px; padding:10px 12px;
      font-weight:900; background:rgba(255,255,255,.08); color:#fff;
    }

    .raceTabs{
      margin-top:10px;
      display:flex; gap:8px; overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:6px;
    }
    .raceTabs::-webkit-scrollbar{ display:none; }
    .tab{
      flex:0 0 auto;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:#fff;
      font-weight:900;
      font-size:13px;
    }
    .tab.is-active{ background:var(--accent); color:#000; border-color:transparent; }

    .raceBody{
      height:calc(100dvh - var(--raceTopH));
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:12px;
    }

    .section{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
    }
    .secTitle{
      margin:0 0 10px;
      font-size:13px;
      color:var(--muted);
      letter-spacing:.08em;
      font-weight:900;
    }

    .table{ display:flex; flex-direction:column; gap:8px; }
    .row{
      display:grid;
      grid-template-columns: 44px 1fr 118px;
      gap:10px;
      align-items:center;
      background:var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:10px 10px;
    }
    .waku{
      width:44px; height:44px;
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-weight:1000;
      color:#000;
      background:#fff;
    }
    .waku.w1{ background:#ffffff; }
    .waku.w2{ background:#111827; color:#fff; }
    .waku.w3{ background:#ef4444; color:#fff; }
    .waku.w4{ background:#2563eb; color:#fff; }
    .waku.w5{ background:#fbbf24; color:#000; }
    .waku.w6{ background:#22c55e; color:#000; }

    .info{ min-width:0; display:flex; flex-direction:column; gap:2px; }
    .name{
      font-weight:1000; font-size:14px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .sub{
      font-size:12px;
      color:rgba(255,255,255,.72);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .metric{
      text-align:right;
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }
    .st{ font-weight:1000; font-size:13px; }
    .win{ font-size:11px; color:rgba(255,255,255,.7); }
    .muted{ color:rgba(255,255,255,.68); }

    .note{
      margin-top:10px;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.6;
    }
    .err{
      font-size:12px;
      color:rgba(255,255,255,.72);
      line-height:1.7;
      padding:10px 12px;
      border:1px dashed rgba(255,255,255,.18);
      border-radius:12px;
      background:rgba(255,255,255,.03);
      word-break:break-word;
    }
    .safeBottom{ height:calc(16px + env(safe-area-inset-bottom)); }
  </style>
</head>

<body>
  <div class="raceTop" id="raceTop">
    <div class="raceHead">
      <div class="raceHead__left">
        <div id="venueName" class="raceVenue">—</div>
        <div class="raceMeta">
          <span id="raceNoLabel">—R</span>
          <span id="timeLabel">締切: --:--</span>
        </div>
      </div>
      <button class="raceBtn" type="button" id="btnBack">戻る</button>
    </div>

    <div class="raceTabs" id="tabs" aria-label="レース番号"></div>
  </div>

  <div class="raceBody" id="raceBody">
    <section class="section">
      <h2 class="secTitle">出走表（無料：選手情報のみ）</h2>
      <div class="table" id="table"></div>
      <div class="note" id="note">
        ※無料版は「各選手データの確認」専用です。予想は表示しません。
      </div>
      <div class="safeBottom"></div>
    </section>
  </div>

  <script>
    // ======================
    // 受け取り
    // ======================
    const qs = new URLSearchParams(location.search);
    const venueNameRaw = qs.get("name") || "会場";
    const venueName = decodeURIComponent(venueNameRaw);

    document.getElementById("venueName").textContent = venueName;

    const $tabs = document.getElementById("tabs");
    const $table = document.getElementById("table");
    const $raceNoLabel = document.getElementById("raceNoLabel");
    const $timeLabel = document.getElementById("timeLabel");
    const $raceTop = document.getElementById("raceTop");

    // ✅ bot repo の race json 直読み（ここだけが正）
    const BOT_RACES_BASE_URL =
      "https://raw.githubusercontent.com/raceanalysislab/race-data-bot/main/data/site/races/";

    function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

    function toHM(x){
      const s = String(x || "");
      const m = s.match(/(\d{1,2}):(\d{2})/);
      if (!m) return "--:--";
      const hh = String(m[1]).padStart(2,"0");
      return `${hh}:${m[2]}`;
    }

    function setTopHeight(){
      const h = $raceTop.getBoundingClientRect().height || 132;
      document.documentElement.style.setProperty("--raceTopH", `${Math.ceil(h)}px`);
    }
    addEventListener("resize", () => setTopHeight(), {passive:true});
    requestAnimationFrame(() => setTopHeight());

    function makeTabs(active){
      $tabs.innerHTML = "";
      for(let r=1; r<=12; r++){
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tab" + (r===active ? " is-active" : "");
        b.textContent = r + "R";
        b.addEventListener("click", () => setRace(r));
        $tabs.appendChild(b);
      }
    }

    function escapeHTML(s){
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    async function fetchJSON(url){
      const bust = url.includes("?") ? `&t=${Date.now()}` : `?t=${Date.now()}`;
      const res = await fetch(url + bust, { cache:"no-store" });
      if (!res.ok) throw new Error(`failed: ${url}`);
      return await res.json();
    }

    function rowHTML(p){
      const w = Number(p.waku ?? 0) || 0;

      const idText = (p.regno || p.id) ? `登録 ${p.regno || p.id}` : "";
      const branchText = p.branch ? String(p.branch) : "";
      const ageText = (p.age !== undefined && p.age !== null && p.age !== "") ? `年齢 ${p.age}` : "";
      const gradeText = p.grade ? String(p.grade) : "";

      const natWin = (p.nat_win !== undefined && p.nat_win !== null) ? `勝率 ${Number(p.nat_win).toFixed(2)}` : "";
      const nat2 = (p.nat_2 !== undefined && p.nat_2 !== null) ? `2連 ${Number(p.nat_2).toFixed(2)}%` : "";
      const motor = (p.motor_no !== undefined && p.motor_no !== null) ? `M${p.motor_no} (${p.motor_2 ?? ""}%)` : "";
      const boat = (p.boat_no !== undefined && p.boat_no !== null) ? `B${p.boat_no} (${p.boat_2 ?? ""}%)` : "";

      const rightTop = (natWin || nat2) ? [natWin, nat2].filter(Boolean).join(" / ") : "—";
      const rightBtm = [motor, boat].filter(Boolean).join(" / ");

      return `
        <div class="row">
          <div class="waku w${w}">${w || ""}</div>

          <div class="info">
            <div class="name">${escapeHTML(p.name || "")}</div>
            <div class="sub">
              ${idText ? `<span>${escapeHTML(idText)}</span>` : ``}
              ${branchText ? `<span>${escapeHTML(branchText)}</span>` : ``}
              ${ageText ? `<span class="muted">${escapeHTML(ageText)}</span>` : ``}
              ${gradeText ? `<span class="muted">${escapeHTML(gradeText)}</span>` : ``}
            </div>
          </div>

          <div class="metric">
            <div class="st">${escapeHTML(rightTop)}</div>
            <div class="win">${escapeHTML(rightBtm || "")}</div>
          </div>
        </div>
      `;
    }

    function renderRaceJSON(r, json){
      $raceNoLabel.textContent = `${r}R`;

      const close = json?.race?.cutoff || json?.cutoff || "";
      $timeLabel.textContent = "締切: " + toHM(close);

      const boats = Array.isArray(json?.race?.boats) ? json.race.boats : [];
      if (!boats.length){
        $table.innerHTML = `<div class="err">出走表が空です。<br>（race.boats が見つかりません）</div>`;
        return;
      }

      boats.sort((a,b) => Number(a.waku||0) - Number(b.waku||0));
      $table.innerHTML = boats.map(rowHTML).join("");
      requestAnimationFrame(() => setTopHeight());
    }

    function syncURLRace(r){
      const next = new URL(location.href);
      next.searchParams.set("race", String(r));
      history.replaceState(null, "", next.toString());
    }

    async function setRace(r){
      r = clamp(Number(r)||1, 1, 12);
      makeTabs(r);
      syncURLRace(r);

      $raceNoLabel.textContent = `${r}R`;
      $timeLabel.textContent = "締切: --:--";
      $table.innerHTML = `<div class="err">データを読み込み中…</div>`;

      if (!venueName || venueName === "会場"){
        $table.innerHTML = `<div class="err">name が指定されていません。<br>例：race.html?name=平和島</div>`;
        return;
      }

      // ✅ ここが重要：ファイル名は「若松_1R.json」みたいに日本語のまま
      // ✅ encodeURIComponent しない（= GitHub上の実ファイル名と一致させる）
      const url = `${BOT_RACES_BASE_URL}${venueName}_${r}R.json`;

      try{
        const json = await fetchJSON(url);
        renderRaceJSON(r, json);
      }catch(e){
        $table.innerHTML = `<div class="err">JSONの取得に失敗しました。<br>${escapeHTML(url)}<br>（ファイル未生成 or URL違い）</div>`;
      }
    }

    async function boot(){
      const initialRace = clamp(Number(qs.get("race") || 1) || 1, 1, 12);
      makeTabs(initialRace);
      await setRace(initialRace);
      requestAnimationFrame(() => setTopHeight());
    }

    document.getElementById("btnBack").addEventListener("click", () => history.back());
    boot();
  </script>
</body>
</html>
