<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f3f4f6" />
<title>BOAT CORE</title>

<link rel="stylesheet" href="./style.css?v=2" />
<link rel="stylesheet" href="./css/base.css?v=2" />
<link rel="stylesheet" href="./css/layout.css?v=2" />
<link rel="stylesheet" href="./css/header.css?v=3" />
<link rel="stylesheet" href="./css/grid.css?v=2" />
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet" />
</head>

<body>

<header class="top">

  <div class="top__row">

    <div class="top__titleWrap">
      <h1 class="top__title">BOAT CORE</h1>
      <div class="top__subtitle">本日の開催一覧</div>
    </div>

    <div class="top__actions">

      <button id="btnPro" class="top__pro" type="button" aria-pressed="false">
        <span class="top__proDot" aria-hidden="true"></span>
        <span>PRO</span>
      </button>

      <button id="btnRefresh" class="top__btn" type="button">
        更新
      </button>

    </div>
  </div>

  <div class="top__searchRow">

    <div class="top__search">
      <input
        id="playerSearchInput"
        class="playerSearchInput"
        type="text"
        placeholder="登録番号 / 選手名で検索"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="search"
        aria-label="登録番号または選手名で検索"
      />

      <div id="playerSearchResult" class="playerSearchResult" aria-live="polite"></div>
    </div>

    <div class="top__next">

      <a id="nextRaceBox" class="nextRaceBox" href="javascript:void(0)" aria-label="最短締切レース">

        <div class="nextRaceBox__label">
          NEXT
        </div>

        <div id="nextRaceText" class="nextRaceBox__main">
          --
        </div>

      </a>

    </div>
  </div>

  <div class="top__sub">
    <div class="top__updated">
      最終更新:
      <span id="updatedAt">--:--</span>
    </div>
  </div>

</header>

<main class="wrap">

  <section class="gridWrap">
    <section id="grid" class="grid"></section>
  </section>

  <section class="picksWrap">

    <div class="picksHead">

      <h2 class="picksTitle">
        本日厳選レース
      </h2>

      <div class="picksMeta">
        更新:
        <span id="picksUpdatedAt">--:--</span>
      </div>

    </div>

    <div id="picksCta" class="picksCta"></div>
    <div id="picks" class="picksList"></div>

  </section>

</main>

<div id="proModal" class="proModal" aria-hidden="true">

  <div class="proModalBox" role="dialog" aria-modal="true" aria-label="PROキー入力">

    <div class="proTitle">
      PROキー入力
    </div>

    <div class="proDesc">
      note購読者専用機能です<br>
      配布された6桁キーを入力してください
    </div>

    <div class="proInputs" id="proInputs">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="1桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="2桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="3桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="4桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="5桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="6桁目" autocomplete="one-time-code">
    </div>

    <button id="proUnlock" class="proUnlock" type="button">
      PROを解放する
    </button>

    <div class="proBottom">
      <button id="proCancel" type="button">キャンセル</button>
      <button id="proClear" type="button">クリア</button>
    </div>

  </div>
</div>

<script defer src="./js/app.js?v=8"></script>
<script defer src="./js/player-search.js?v=2"></script>

</body>
</html>
