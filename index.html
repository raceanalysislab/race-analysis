<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<meta name="theme-color" content="#0b0b0f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BOAT CORE" />

<title>BOAT CORE</title>

<link rel="icon" type="image/png" sizes="512x512" href="./core.PNG" />
<link rel="apple-touch-icon" sizes="180x180" href="./core.PNG" />
<link rel="manifest" href="./manifest.webmanifest" />

<link rel="stylesheet" href="./style.css?v=8" />
<link rel="stylesheet" href="./css/base.css?v=5" />
<link rel="stylesheet" href="./css/layout.css?v=5" />
<link rel="stylesheet" href="./css/header.css?v=5" />
<link rel="stylesheet" href="./css/grid.css?v=28" />

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet" />
</head>

<body>

<header class="top">

  <div class="top__row">

    <div class="top__titleWrap">
      <h1 class="top__title">BOAT CORE</h1>
      <div class="top__subtitle">本日開催一覧</div>
    </div>

    <div class="top__actions">

      <button id="btnPro" class="top__pro" type="button" aria-pressed="false">
        <span class="top__proDot" aria-hidden="true"></span>
        <span>PRO</span>
      </button>

      <button id="btnRefresh" class="top__btn" type="button">
        更新
      </button>

    </div>

  </div>

  <div class="top__searchRow">

    <div class="top__search">

      <input
        id="playerSearchInput"
        class="playerSearchInput"
        type="text"
        placeholder="登録番号 / 選手名で検索"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="search"
        aria-label="登録番号または選手名で検索"
      />

      <div id="playerSearchResult" class="playerSearchResult" aria-live="polite"></div>

    </div>

    <div class="top__next">

      <a id="nextRaceBox" class="nextRaceBox" href="javascript:void(0)" aria-label="最短締切レース">

        <div class="nextRaceBox__label">
          NEXT
        </div>

        <div id="nextRaceText" class="nextRaceBox__main">
          --
        </div>

      </a>

    </div>

  </div>

  <div class="top__sub">

    <div class="top__updated">
      最終更新:
      <span id="updatedAt">--:--</span>
    </div>

  </div>

</header>

<main class="wrap">

  <section class="gridWrap">
    <section id="grid" class="grid"></section>
  </section>

  <section class="picksWrap">

    <div class="picksHead">

      <h2 class="picksTitle">
        本日厳選レース
      </h2>

      <div class="picksMeta">
        更新:
        <span id="picksUpdatedAt">--:--</span>
      </div>

    </div>

    <a id="pickHeroLink" class="pickHero" href="https://note.com/wsnndboat7" aria-label="本日厳選レースを見る">
      <img
        class="pickHero__img"
        src="./img/today-pick-banner2.PNG?v=1"
        alt="本日限定 本日厳選2本"
      />
    </a>

    <div class="pickBundle">

      <a id="setPurchaseLink" class="pickBundle__main" href="javascript:void(0)" aria-label="予想とPROセットを見る">

        <div class="pickBundle__mainBadgeRow">
          <span class="pickBundle__badge pickBundle__badge--popular">人気</span>
          <span class="pickBundle__mainMini">本日限定 / 残りわずか</span>
        </div>

        <div class="pickBundle__mainLead">最も選ばれています</div>

        <h3 class="pickBundle__mainTitle">予想+PROセット</h3>

        <div class="pickBundle__mainPrice">800円</div>

        <div class="pickBundle__mainSub">
          厳選予想とPROデータをまとめて確認
        </div>

        <div class="pickBundle__mainCta">
          セットを見る
          <span aria-hidden="true">→</span>
        </div>

      </a>

      <a id="proPurchaseLink" class="pickBundle__sub" href="javascript:void(0)" aria-label="PROデータのみを見る">

        <div class="pickBundle__subBadgeRow">
          <span class="pickBundle__badge pickBundle__badge--pro">PRO</span>
        </div>

        <div class="pickBundle__subLead">分析向け</div>

        <h3 class="pickBundle__subTitle">PROデータのみ</h3>

        <div class="pickBundle__subPrice">500円</div>

        <div class="pickBundle__subSub">
          詳細データだけ確認したい方向け
        </div>

        <div class="pickBundle__subCta">
          PROを見る
          <span aria-hidden="true">→</span>
        </div>

      </a>

    </div>

    <div id="picksCta" class="picksCta"></div>
    <div id="picks" class="picksList"></div>

  </section>

</main>

<div id="proModal" class="proModal" aria-hidden="true">

  <div class="proModalBox" role="dialog" aria-modal="true" aria-label="PRO認証">

    <div class="proBadge" aria-hidden="true">
      <span class="proBadge__main">BOAT CORE</span>
      <span class="proBadge__sub">PRO</span>
    </div>

    <div class="proTitle">
      PRO認証
    </div>

    <div class="proDesc">
      note購読者専用の6桁キーを入力してください
    </div>

    <div class="proInputs" id="proInputs">

      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="1桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="2桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="3桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="4桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="5桁目" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric" type="tel" pattern="[0-9]*" aria-label="6桁目" autocomplete="one-time-code">

    </div>

    <button id="proUnlock" class="proUnlock" type="button">
      認証して続ける
    </button>

    <div class="proDivider" aria-hidden="true"></div>

    <div class="proBottom">
      <button id="proClear" type="button">クリア</button>
      <span class="proBottom__sep" aria-hidden="true">|</span>
      <button id="proCancel" type="button">閉じる</button>
    </div>

  </div>

</div>

<script defer src="./js/app.js?v=36"></script>
<script defer src="./js/player-search.js?v=31"></script>

</body>
</html>
