<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f3f4f6" />
<title>BOAT CORE</title>

<link rel="stylesheet" href="./style.css?v=1" />
<link rel="stylesheet" href="./css/base.css?v=1" />
<link rel="stylesheet" href="./css/layout.css?v=1" />
<link rel="stylesheet" href="./css/header.css?v=1" />
<link rel="stylesheet" href="./css/grid.css?v=1" />
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet" />
</head>

<body>

<header class="top">

<div class="top__row">

<div class="top__titleWrap">
<h1 class="top__title">BOAT CORE</h1>
<div class="top__subtitle">本日の開催一覧</div>
</div>

<div class="top__actions">

<button id="btnPro" class="top__pro" type="button">
<span class="top__proDot"></span>
<span>PRO</span>
</button>

<button id="btnRefresh" class="top__btn" type="button">
更新
</button>

</div>
</div>

<div class="top__searchRow">

<div class="top__search">
<input
id="playerSearchInput"
class="playerSearchInput"
type="text"
placeholder="登録番号 / 選手名で検索"
autocomplete="off"
/>

<div id="playerSearchResult" class="playerSearchResult"></div>
</div>

<div class="top__next">

<a id="nextRaceBox" class="nextRaceBox" href="javascript:void(0)">

<div class="nextRaceBox__label">
NEXT
</div>

<div id="nextRaceText" class="nextRaceBox__main">
--
</div>

</a>

</div>
</div>

<div class="top__sub">
<div class="top__updated">
最終更新:
<span id="updatedAt">--:--</span>
</div>
</div>

</header>


<main class="wrap">

<section class="gridWrap">
<section id="grid" class="grid"></section>
</section>


<section class="picksWrap">

<div class="picksHead">

<h2 class="picksTitle">
本日厳選レース
</h2>

<div class="picksMeta">
更新:
<span id="picksUpdatedAt">--:--</span>
</div>

</div>

<div id="picksCta" class="picksCta"></div>
<div id="picks" class="picksList"></div>

</section>

</main>


<div id="proModal" class="proModal" aria-hidden="true">

<div class="proModalBox">

<div class="proTitle">
PROキー入力
</div>

<div class="proDesc">
note購読者専用機能です<br>
配布された6桁キーを入力してください
</div>

<div class="proInputs" id="proInputs">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
</div>

<button id="proUnlock" class="proUnlock">
PROを解放する
</button>

<div class="proBottom">
<button id="proCancel">キャンセル</button>
<button id="proClear">クリア</button>
</div>

</div>
</div>


<!-- JS -->

<script defer src="./js/app.js?v=7"></script>
<script defer src="./js/player-search.js?v=1"></script>

</body>
</html>
