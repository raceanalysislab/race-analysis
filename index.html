<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f3f4f6" />
  <title>本日の開催一覧</title>

  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/grid.css" />
</head>

<body>
<header class="top">
  <div class="top__row">
    <h1 class="top__title">本日の開催一覧</h1>
    <div class="top__actions">
      <button id="btnRefresh" class="top__btn" type="button">更新</button>
    </div>
  </div>
  <div class="top__sub">
    <div class="top__updated">最終更新: <span id="updatedAt">--:--</span></div>
  </div>
</header>

<main class="wrap">
  <section class="gridWrap">
    <section id="grid" class="grid"></section>
  </section>
</main>

<script>
/* ===============================
   固定会場順
================================ */
const VENUES = [
  { jcd:"01",name:"桐生"},{jcd:"02",name:"戸田"},{jcd:"03",name:"江戸川"},{jcd:"04",name:"平和島"},
  { jcd:"05",name:"多摩川"},{jcd:"06",name:"浜名湖"},{jcd:"07",name:"蒲郡"},{jcd:"08",name:"常滑"},
  { jcd:"09",name:"津"},{jcd:"10",name:"三国"},{jcd:"11",name:"びわこ"},{jcd:"12",name:"住之江"},
  { jcd:"13",name:"尼崎"},{jcd:"14",name:"鳴門"},{jcd:"15",name:"丸亀"},{jcd:"16",name:"児島"},
  { jcd:"17",name:"宮島"},{jcd:"18",name:"徳山"},{jcd:"19",name:"下関"},{jcd:"20",name:"若松"},
  { jcd:"21",name:"芦屋"},{jcd:"22",name:"福岡"},{jcd:"23",name:"唐津"},{jcd:"24",name:"大村"},
];

const BOT_URL =
"https://raw.githubusercontent.com/raceanalysislab/race-data-bot/main/data/venues_today.json";

const $grid = document.getElementById("grid");
const $updatedAt = document.getElementById("updatedAt");
const $btn = document.getElementById("btnRefresh");

const pad2 = n => String(n).padStart(2,"0");

/* ===============================
   時刻系ユーティリティ
================================ */
function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes();
}

function parseHM(str){
  const m = String(str||"").match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  return Number(m[1])*60 + Number(m[2]);
}

/* ===============================
   cutoffsから次Rをリアルタイム算出
================================ */
function computeNextFromCutoffs(cutoffs){
  if(!Array.isArray(cutoffs)) return null;

  const nowMin = nowMinutes();

  const list = cutoffs
    .map(x => ({ rno:x.rno, time:x.time, min:parseHM(x.time) }))
    .filter(x => x.min !== null)
    .sort((a,b)=>a.min-b.min);

  for(const r of list){
    if(r.min > nowMin){
      return { next_r:r.rno, close_at:r.time };
    }
  }
  return null; // 全R終了
}

/* ===============================
   描画
================================ */
function raceTimeLine(v){
  if(!v.held) return "-- --";
  if(v.next_r && v.close_at) return `${v.next_r}R ${v.close_at}`;
  return "終了";
}

function cardHTML(v){
  const cls = v.held ? "card card--on" : "card card--off";
  return `
    <div class="${cls}">
      <div class="card__name">${v.name}</div>
      <div class="card__line card__line--btm">${raceTimeLine(v)}</div>
    </div>
  `;
}

function render(raw){

  const map = new Map();
  (raw.venues||[]).forEach(v=>{
    map.set(v.jcd,v);
  });

  const merged = VENUES.map(base=>{
    const v = map.get(base.jcd)||{};
    const held = v.held===true;

    let next_r=null, close_at=null;

    if(held && Array.isArray(v.cutoffs)){
      const nxt = computeNextFromCutoffs(v.cutoffs);
      if(nxt){
        next_r=nxt.next_r;
        close_at=nxt.close_at;
      }
    }

    return {
      jcd:base.jcd,
      name:base.name,
      held,
      next_r,
      close_at
    };
  });

  $grid.innerHTML = merged.map(cardHTML).join("");

  // 🔥 最終更新は常に「端末現在時刻」
  const d = new Date();
  $updatedAt.textContent = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

/* ===============================
   fetch
================================ */
async function load(){
  const url = BOT_URL + "?t=" + Date.now();
  const res = await fetch(url,{cache:"no-store"});
  if(!res.ok) return;
  const data = await res.json();
  render(data);
}

$btn.addEventListener("click",load);

/* ===============================
   起動
================================ */
load();

/* 30秒ごとに自動更新（即戦力仕様） */
setInterval(load,30000);

</script>
</body>
</html>
