<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7fb">
  <title>選手情報 | BOAT CORE</title>

  <link rel="stylesheet" href="./css/player-detail.css?v=1">
</head>

<body>
  <div class="playerTop" id="playerTop">
    <div class="playerHead">
      <div class="playerHead__left">
        <div class="playerBrand">BOAT CORE</div>

        <div class="playerTitleRow">
          <div class="playerName" id="playerName">—</div>
          <div class="playerMetaInline" id="playerMetaInline">—</div>
        </div>

        <div class="playerSubMeta">
          <span class="playerSubChip" id="playerVenue">—</span>
          <span class="playerSubChip" id="playerRace">—R</span>
          <span class="playerSubChip" id="playerDate">—</span>
        </div>
      </div>

      <button class="playerBackBtn" type="button" id="btnBack">戻る</button>
    </div>
  </div>

  <main class="playerBody">
    <section class="playerSection playerSection--basic">
      <div class="playerSectionTitle">選手基本情報</div>
      <div class="playerBasicGrid" id="playerBasicGrid"></div>
    </section>

    <section class="playerSection">
      <div class="playerSectionTitle">直近1年コースデータ</div>
      <div class="playerTableWrap">
        <div class="playerCourseTable" id="playerCourseStats"></div>
      </div>
    </section>

    <section class="playerSection">
      <div class="playerSectionTitle">進入コース別平均スタートタイミング</div>
      <div class="playerTableWrap">
        <div class="playerTimingTable" id="playerTimingTable"></div>
      </div>
    </section>
  </main>

  <script src="./js/player-detail.js?v=1"></script>
</body>
</html>
